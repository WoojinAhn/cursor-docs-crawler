name: Release PDF

on:
  workflow_dispatch:
  schedule:
    # Weekly Sunday 06:00 UTC (after fixture refresh at 03:00)
    - cron: '0 6 * * 0'

jobs:
  generate-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies (Chrome + WeasyPrint)
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf2.0-0
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Generate Korean PDF
        run: python main.py --output cursor_docs_ko.pdf --lang ko --verbose

      - name: Generate English PDF
        run: python main.py --output cursor_docs_en.pdf --lang en --verbose

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="docs-$(date -u +%Y-%m-%d)"
          TITLE="Cursor Docs PDF - $(date -u +%Y-%m-%d)"

          KO_STATS=$(tail -5 <<< "$(python -c "
          import os
          size_mb = os.path.getsize('cursor_docs_ko.pdf') / (1024*1024)
          print(f'{size_mb:.1f} MB')
          ")")
          EN_STATS=$(tail -5 <<< "$(python -c "
          import os
          size_mb = os.path.getsize('cursor_docs_en.pdf') / (1024*1024)
          print(f'{size_mb:.1f} MB')
          ")")

          BODY="Auto-generated PDFs from [cursor.com/docs](https://cursor.com/docs).

          | File | Language | Size |
          |------|----------|------|
          | cursor_docs_ko.pdf | 한국어 | ${KO_STATS} |
          | cursor_docs_en.pdf | English | ${EN_STATS} |

          Generated by [cursor-docs-crawler](https://github.com/WoojinAhn/cursor-docs-crawler)."

          # Delete existing release with same tag (if re-running on same day)
          gh release delete "$TAG" --yes 2>/dev/null || true
          git push --delete origin "$TAG" 2>/dev/null || true

          gh release create "$TAG" \
            --title "$TITLE" \
            --notes "$BODY" \
            cursor_docs_ko.pdf \
            cursor_docs_en.pdf
