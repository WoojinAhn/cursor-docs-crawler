name: Release PDF

on:
  workflow_dispatch:
  schedule:
    # Weekly Sunday 06:00 UTC (after fixture refresh at 03:00)
    - cron: '0 6 * * 0'

jobs:
  generate-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies (Chrome + WeasyPrint)
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf2.0-0 fonts-noto-cjk
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Generate Korean docs PDF
        run: python main.py --scope docs --output cursor_docs_ko.pdf --lang ko --verbose

      - name: Generate English docs PDF
        run: python main.py --scope docs --output cursor_docs_en.pdf --lang en --verbose

      - name: Generate Korean help PDF
        run: python main.py --scope help --output cursor_help_ko.pdf --lang ko --verbose

      - name: Generate English help PDF
        run: python main.py --scope help --output cursor_help_en.pdf --lang en --verbose

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="docs-$(date -u +%Y-%m-%d)"
          TITLE="Cursor Docs PDF - $(date -u +%Y-%m-%d)"

          get_size() { python -c "import os; print(f'{os.path.getsize(\"$1\") / (1024*1024):.1f} MB')"; }

          DOCS_KO=$(get_size cursor_docs_ko.pdf)
          DOCS_EN=$(get_size cursor_docs_en.pdf)
          HELP_KO=$(get_size cursor_help_ko.pdf)
          HELP_EN=$(get_size cursor_help_en.pdf)

          BODY="Auto-generated PDFs from [cursor.com/docs](https://cursor.com/docs) and [cursor.com/help](https://cursor.com/help).

          ### Docs (Technical Reference)
          | File | Language | Size |
          |------|----------|------|
          | cursor_docs_ko.pdf | 한국어 | ${DOCS_KO} |
          | cursor_docs_en.pdf | English | ${DOCS_EN} |

          ### Help (User Guide & Troubleshooting)
          | File | Language | Size |
          |------|----------|------|
          | cursor_help_ko.pdf | 한국어 | ${HELP_KO} |
          | cursor_help_en.pdf | English | ${HELP_EN} |

          Generated by [cursor-docs-crawler](https://github.com/WoojinAhn/cursor-docs-crawler)."

          # Delete existing release with same tag (if re-running on same day)
          gh release delete "$TAG" --yes 2>/dev/null || true
          git push --delete origin "$TAG" 2>/dev/null || true

          gh release create "$TAG" \
            --title "$TITLE" \
            --notes "$BODY" \
            cursor_docs_ko.pdf \
            cursor_docs_en.pdf \
            cursor_help_ko.pdf \
            cursor_help_en.pdf
