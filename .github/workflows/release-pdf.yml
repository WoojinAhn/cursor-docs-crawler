name: Release PDF

on:
  workflow_dispatch:
  schedule:
    # Weekly Sunday 06:00 UTC (after fixture refresh at 03:00)
    - cron: '0 6 * * 0'

jobs:
  generate-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies (WeasyPrint)
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf2.0-0 fonts-noto-cjk

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Generate Korean docs PDF
        run: |
          OUTPUT=$(python main.py --scope docs --output cursor_docs_ko.pdf --lang ko --verbose)
          echo "$OUTPUT"
          PAGES=$(echo "$OUTPUT" | grep -oP 'Total pages: \K\d+' || echo "0")
          echo "docs_ko_pages=$PAGES" >> "$GITHUB_ENV"

      - name: Generate English docs PDF
        run: |
          OUTPUT=$(python main.py --scope docs --output cursor_docs_en.pdf --lang en --verbose)
          echo "$OUTPUT"
          PAGES=$(echo "$OUTPUT" | grep -oP 'Total pages: \K\d+' || echo "0")
          echo "docs_en_pages=$PAGES" >> "$GITHUB_ENV"

      - name: Generate Korean help PDF
        run: |
          OUTPUT=$(python main.py --scope help --output cursor_help_ko.pdf --lang ko --verbose)
          echo "$OUTPUT"
          PAGES=$(echo "$OUTPUT" | grep -oP 'Total pages: \K\d+' || echo "0")
          echo "help_ko_pages=$PAGES" >> "$GITHUB_ENV"

      - name: Generate English help PDF
        run: |
          OUTPUT=$(python main.py --scope help --output cursor_help_en.pdf --lang en --verbose)
          echo "$OUTPUT"
          PAGES=$(echo "$OUTPUT" | grep -oP 'Total pages: \K\d+' || echo "0")
          echo "help_en_pages=$PAGES" >> "$GITHUB_ENV"

      - name: Validate PDF page counts
        run: |
          MIN_DOCS=5
          MIN_HELP=3
          echo "Page counts — docs_ko: $docs_ko_pages, docs_en: $docs_en_pages, help_ko: $help_ko_pages, help_en: $help_en_pages"

          FAILED=false
          [ "$docs_ko_pages" -lt "$MIN_DOCS" ] && echo "::error::docs_ko has only $docs_ko_pages pages (min: $MIN_DOCS)" && FAILED=true
          [ "$docs_en_pages" -lt "$MIN_DOCS" ] && echo "::error::docs_en has only $docs_en_pages pages (min: $MIN_DOCS)" && FAILED=true
          [ "$help_ko_pages" -lt "$MIN_HELP" ] && echo "::error::help_ko has only $help_ko_pages pages (min: $MIN_HELP)" && FAILED=true
          [ "$help_en_pages" -lt "$MIN_HELP" ] && echo "::error::help_en has only $help_en_pages pages (min: $MIN_HELP)" && FAILED=true

          if [ "$FAILED" = true ]; then
            echo "::error::Aborting release — PDF page counts below minimum threshold"
            exit 1
          fi

      - name: Generate change summary
        id: changes
        run: |
          # Find previous release tag
          PREV_TAG=$(gh release list --exclude-drafts --limit 1 --json tagName --jq '.[0].tagName' 2>/dev/null || echo "")
          SNAPSHOT=".github/llms-txt-snapshot.txt"

          # Fetch the tag's commit so git show can access its tree
          if [ -n "$PREV_TAG" ]; then
            git fetch --depth=1 origin tag "$PREV_TAG" 2>/dev/null || true
          fi

          if [ -z "$PREV_TAG" ] || ! git rev-parse "$PREV_TAG" >/dev/null 2>&1; then
            echo "summary=_First release — no previous snapshot to compare._" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Get old snapshot from previous release tag
          OLD_SNAPSHOT=$(git show "$PREV_TAG:$SNAPSHOT" 2>/dev/null || echo "")
          if [ -z "$OLD_SNAPSHOT" ]; then
            echo "summary=_No previous snapshot found in $PREV_TAG._" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Extract .md URLs from both snapshots, strip .md suffix
          OLD_URLS=$(echo "$OLD_SNAPSHOT" | grep -oE 'https://cursor\.com/[^ )]+\.md' | sed 's/\.md$//' | sort)
          NEW_URLS=$(grep -oE 'https://cursor\.com/[^ )]+\.md' "$SNAPSHOT" | sed 's/\.md$//' | sort)

          ADDED=$(comm -13 <(echo "$OLD_URLS") <(echo "$NEW_URLS"))
          REMOVED=$(comm -23 <(echo "$OLD_URLS") <(echo "$NEW_URLS"))

          if [ -z "$ADDED" ] && [ -z "$REMOVED" ]; then
            {
              echo 'summary<<EOFSUM'
              echo '_No documentation structure changes since last release._'
              echo 'EOFSUM'
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Group by section (second path segment: /docs/SECTION/... or /help/SECTION/...)
          group_by_section() {
            local urls="$1"
            local label="$2"
            [ -z "$urls" ] && return

            echo ""
            echo "**${label}:**"

            echo "$urls" | while read -r url; do
              # Extract section from URL path: /docs/agent/overview -> agent
              SECTION=$(echo "$url" | sed -E 's#https://cursor\.com/(docs|help)/##' | cut -d/ -f1)
              PAGE=$(echo "$url" | sed -E 's#https://cursor\.com/(docs|help)/##')
              echo "- \`${PAGE}\` (${SECTION})"
            done
          }

          {
            echo 'summary<<EOFSUM'
            ADDED_COUNT=$(echo "$ADDED" | grep -c . || echo "0")
            REMOVED_COUNT=$(echo "$REMOVED" | grep -c . || echo "0")
            echo "**${ADDED_COUNT} added, ${REMOVED_COUNT} removed** (compared to ${PREV_TAG})"
            group_by_section "$ADDED" "Added"
            group_by_section "$REMOVED" "Removed"
            echo 'EOFSUM'
          } >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="docs-$(date -u +%Y-%m-%d)"
          TITLE="Cursor Docs PDF - $(date -u +%Y-%m-%d)"

          get_size() { python -c "import os; print(f'{os.path.getsize(\"$1\") / (1024*1024):.1f} MB')"; }

          DOCS_KO=$(get_size cursor_docs_ko.pdf)
          DOCS_EN=$(get_size cursor_docs_en.pdf)
          HELP_KO=$(get_size cursor_help_ko.pdf)
          HELP_EN=$(get_size cursor_help_en.pdf)

          CHANGES='${{ steps.changes.outputs.summary }}'
          BODY="Auto-generated PDFs from [cursor.com/docs](https://cursor.com/docs) and [cursor.com/help](https://cursor.com/help).

          ### Docs (Technical Reference)
          | File | Language | Size |
          |------|----------|------|
          | cursor_docs_ko.pdf | 한국어 | ${DOCS_KO} |
          | cursor_docs_en.pdf | English | ${DOCS_EN} |

          ### Help (User Guide & Troubleshooting)
          | File | Language | Size |
          |------|----------|------|
          | cursor_help_ko.pdf | 한국어 | ${HELP_KO} |
          | cursor_help_en.pdf | English | ${HELP_EN} |

          ### Changes since last release
          ${CHANGES}

          Generated by [cursor-docs-crawler](https://github.com/WoojinAhn/cursor-docs-crawler)."

          # Delete existing release with same tag (if re-running on same day)
          gh release delete "$TAG" --yes 2>/dev/null || true
          git push --delete origin "$TAG" 2>/dev/null || true

          gh release create "$TAG" \
            --title "$TITLE" \
            --notes "$BODY" \
            cursor_docs_ko.pdf \
            cursor_docs_en.pdf \
            cursor_help_ko.pdf \
            cursor_help_en.pdf

      - name: Create failure issue
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="[CI] Release PDF failed ($(date -u +%Y-%m-%d))"
          BODY="## Workflow Failure
          **Workflow:** Release PDF
          **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          **Date:** $(date -u +%Y-%m-%dT%H:%M:%SZ)
          **Trigger:** ${{ github.event_name }}
          Check the [workflow run logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."

          # Check for existing open issue
          EXISTING=$(gh issue list --label ci-failure --state open --search "Release PDF failed" --json number --jq '.[0].number' 2>/dev/null || echo "")

          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "$BODY"
            echo "Added comment to existing issue #$EXISTING"
          else
            gh label create ci-failure --color d73a4a --description "Automated CI failure report" 2>/dev/null || true
            gh issue create --title "$TITLE" --body "$BODY" --label ci-failure
          fi
