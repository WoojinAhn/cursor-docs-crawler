name: E2E Test

on:
  pull_request:
  workflow_dispatch:
  schedule:
    # Weekly Sunday 03:00 UTC — refresh fixtures from live site
    - cron: '0 3 * * 0'

jobs:
  # Offline E2E: runs on every PR and manual trigger
  offline-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies (WeasyPrint)
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf2.0-0

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run all tests
        run: python -m pytest tests/ -v

      - name: Create failure issue
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="[CI] E2E Test (offline) failed ($(date -u +%Y-%m-%d))"
          BODY="## Workflow Failure

          **Workflow:** E2E Test (offline)
          **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          **Date:** $(date -u +%Y-%m-%dT%H:%M:%SZ)
          **Trigger:** ${{ github.event_name }}

          Check the [workflow run logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."

          # Check for existing open issue
          EXISTING=$(gh issue list --label ci-failure --state open --search "E2E Test (offline) failed" --json number --jq '.[0].number' 2>/dev/null || echo "")

          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "$BODY"
            echo "Added comment to existing issue #$EXISTING"
          else
            gh label create ci-failure --color d73a4a --description "Automated CI failure report" 2>/dev/null || true
            gh issue create --title "$TITLE" --body "$BODY" --label ci-failure
          fi

  # Fixture refresh: runs only on weekly schedule
  refresh-fixtures:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies (WeasyPrint)
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf2.0-0

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Refresh HTML fixtures
        run: python scripts/save_fixtures.py

      - name: Run tests with refreshed fixtures
        run: python -m pytest tests/ -v

      - name: Commit updated fixtures
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tests/fixtures/
          if git diff --cached --quiet; then
            echo "No fixture changes detected"
          else
            git commit -m "chore: refresh HTML fixtures (weekly)"
            git push
          fi

      - name: Create failure issue
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="[CI] E2E Test (refresh-fixtures) failed ($(date -u +%Y-%m-%d))"
          BODY="## Workflow Failure

          **Workflow:** E2E Test (refresh-fixtures)
          **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          **Date:** $(date -u +%Y-%m-%dT%H:%M:%SZ)
          **Trigger:** ${{ github.event_name }}

          Check the [workflow run logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."

          # Check for existing open issue
          EXISTING=$(gh issue list --label ci-failure --state open --search "E2E Test (refresh-fixtures) failed" --json number --jq '.[0].number' 2>/dev/null || echo "")

          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "$BODY"
            echo "Added comment to existing issue #$EXISTING"
          else
            gh label create ci-failure --color d73a4a --description "Automated CI failure report" 2>/dev/null || true
            gh issue create --title "$TITLE" --body "$BODY" --label ci-failure
          fi
