name: Detect Docs Change

on:
  schedule:
    # Every day at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  check-llms-txt:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch current llms.txt
        id: fetch
        run: |
          HTTP_CODE=$(curl -sL -o /tmp/llms-txt-current.txt -w "%{http_code}" \
            -H "User-Agent: Cursor Docs Crawler" \
            https://cursor.com/llms.txt)

          echo "HTTP status: $HTTP_CODE"

          # Validate: must be 200 and start with '#' (llms.txt markdown format)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::warning::llms.txt returned HTTP $HTTP_CODE — skipping"
            echo "valid=false" >> "$GITHUB_OUTPUT"
          elif ! head -1 /tmp/llms-txt-current.txt | grep -q '^#'; then
            echo "::warning::llms.txt response is not valid markdown — likely bot protection page"
            echo "valid=false" >> "$GITHUB_OUTPUT"
          else
            echo "valid=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Compare with snapshot
        if: steps.fetch.outputs.valid == 'true'
        id: diff
        run: |
          SNAPSHOT=".github/llms-txt-snapshot.txt"

          if [ ! -f "$SNAPSHOT" ]; then
            echo "No snapshot found — creating initial snapshot"
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "initial=true" >> "$GITHUB_OUTPUT"
          elif diff -q "$SNAPSHOT" /tmp/llms-txt-current.txt > /dev/null 2>&1; then
            echo "No changes detected"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Changes detected in llms.txt:"
            diff --unified=0 "$SNAPSHOT" /tmp/llms-txt-current.txt || true
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "initial=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update snapshot
        if: steps.fetch.outputs.valid == 'true' && steps.diff.outputs.changed == 'true'
        run: |
          cp /tmp/llms-txt-current.txt .github/llms-txt-snapshot.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/llms-txt-snapshot.txt
          git commit -m "chore: update llms.txt snapshot ($(date -u +%Y-%m-%d))"
          git push

      - name: Trigger release workflow
        if: steps.fetch.outputs.valid == 'true' && steps.diff.outputs.changed == 'true' && steps.diff.outputs.initial == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Triggering Release PDF workflow..."
          gh workflow run "Release PDF"

      - name: Create failure issue
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="[CI] Detect Docs Change failed ($(date -u +%Y-%m-%d))"
          BODY="## Workflow Failure
          **Workflow:** Detect Docs Change
          **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          **Date:** $(date -u +%Y-%m-%dT%H:%M:%SZ)
          **Trigger:** ${{ github.event_name }}
          Check the [workflow run logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."

          # Check for existing open issue
          EXISTING=$(gh issue list --label ci-failure --state open --search "Detect Docs Change failed" --json number --jq '.[0].number' 2>/dev/null || echo "")

          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "$BODY"
            echo "Added comment to existing issue #$EXISTING"
          else
            gh label create ci-failure --color d73a4a --description "Automated CI failure report" 2>/dev/null || true
            gh issue create --title "$TITLE" --body "$BODY" --label ci-failure
          fi
