 있습니다. Cursor는 단순한 편의 기능이 아니라 조직 전반의 확장성을 끌어올리는 도구입니다.\",\"e499a07130a5a421\":\"Cursor를 구동하는 동일한 런타임, 하네스, 모델을 사용해 복잡성을 줄이세요.\",\"e4b78751b6e276a0\":\"오늘 무료로 시작하세요.\",\"e4f4e1f68c0729a2\":\"CursorBench는 범위가 좁은 공개 버그 수정 작업만이 아니라, 개발자들이 실제로 Cursor에 요청하는 모호하고 여러 파일에 걸친 에이전트 작업 유형을 측정하도록 설계되었습니다.\",\"e52b2074849ae4cb\":\"대시보드용 Cursor Rules 설정\",\"e56874cf2fdffdbe\":\"__tests__/mocks/resend.ts +28\",\"e5b33a09567e059a\":\"수정과 테스트를 마쳤습니다. 이 트랜잭션은 재고 업데이트의 원자성을 보장하며, 새 테스트 스위트는 회귀를 잡아낼 것입니다.\",\"e659bf5bc74bb01b\":\"Cursor 변경 로그 RSS 피드\",\"e6901ab4dc3ca09a\":\"스킬\",\"e6c71ebd238296f3\":\"레이아웃 변경 이전인 4시간 전 상태입니다.\",\"e6ea3da9a4c2a6c3\":\"repo 변경 사항 일일 다이제스트\",\"e6f80a59e20084dc\":\"관련 게시물\",\"e7234f3d11527c02\":\"어디서든 기존 설정에 연결하세요.\",\"e74e00ec84ad4b54\":\"멤버 {memberCount}명\",\"e7d5c770b5d8ba0f\":\"가입하고 다음 혜택을 받으세요\",\"e7de8326b9e1b5f7\":\"lib/rate-limit.ts +18 -2\",\"e7e800d82d26fbcd\":\"상태 업데이트 및 PR 전환\",\"e8224b67064685c9\":\"이 메뉴 라벨 색상은 어디에서 정의되어 있나요?\",\"e8254589dbb12140\":\"메뉴 접기\",\"e827c9fb04b06774\":\"Cursor SDK로 시작하세요.\",\"e837ce0913423839\":\"데모 요청\",\"e867dc28193b8e5c\":\"문의 폼\",\"e8a8372561ffed39\":\"Cursor는 기업 규모에 맞게 설계되어 수십만 개의 파일에 걸친 수백만 줄의 코드베이스를 효율적으로 인덱싱하고 탐색합니다. Cursor의 코드베이스 인텔리전스는 팀의 패턴, 규칙, 아키텍처를 학습해 AI 제안이 팀의 코딩 기준에 부합하고 시스템의 고유한 맥락을 이해하도록 보장합니다.\",\"e8b3620507ec4cf1\":\"아이디어\",\"e8d74103a74d5dd7\":\"Pro 시작하기\",\"e8da529b567f533e\":\"팀 전체에 대해 한 번만 설정하세요.\",\"e8daabf4acad6d5b\":\"비교할 플랜 선택\",\"e8e13d1d25f3f575\":\"산업 AI 협회 (AI²)\",\"e90657f9c23fc9a7\":\"localhost:3000/product 스크린샷\",\"e9457e7daec6b0f2\":\"회사명\",\"e959db8e14b36498\":\"Cursor는 현재 SOC 2 Type II를 준수하는 AWS 인프라에서 운영되고 있습니다. 현재 온프레미스 배포는 제공하지 않지만, Cursor의 클라우드 아키텍처는 기업급 보안 제어, 데이터 격리, 그리고 성능을 제공합니다.\",\"e992b8b59e75d97b\":\"결제 옵션에는 어떤 것이 있나요?\",\"e9bafa4b3e45e859\":\"게시물 읽기\",\"e9e38aa502a0348c\":[{\"c\":\"포럼\",\"i\":1,\"t\":\"a\"},\"에 참여해 의견을 공유해 주세요! 비공개 대화를 선호하신다면 \",{\"c\":{\"i\":3,\"k\":\"_gt_value_3\",\"v\":\"v\"},\"i\":2,\"t\":\"a\"},\"(으)로 직접 이메일을 보내셔도 됩니다.\"],\"ea8f0e9faa058b3e\":\"팀 규칙\",\"eb68560de6d7e987\":\"작성자\",\"eb7fe031b6c3dc7d\":\"찾았어요 — DB 쿼리 3개가 순차적으로 실행되고 있었고 캐싱도 없었습니다. 병렬 처리로 바꾸고 Redis를 추가했으며 차트는 지연 로드하도록 했어요. 380ms까지 줄였습니다.\",\"ebb09cad43c9896f\":\"Composer 2.5 자세히 알아보기\",\"ebb17c012d7a20c8\":\"클라우드 Agent를 사용해 보세요\",\"ebf33274ee2bbd52\":\"플러그인\",\"ec091877b8b8c844\":\"구독하기\",\"ec188e4afcfdfe0b\":\"Graphite가 Cursor에 합류했습니다.\",\"ec1f00564fa7d883\":\"Stripe 체크아웃 테스트 준비 완료.\",\"ec21b232e0eacd4a\":\"로그인\",\"ec3c000f3baa9f3c\":\"__tests__/mocks/stripe.ts +42\",\"ec598cacc17ab1ab\":\"MCP 살펴보기\",\"ec9b4f5f7da067ca\":\"SCIM 배포 및 접근 제한\",\"ecc06b99e5d02a25\":\"GDPR 및 CCPA 요건을 준수합니다.\",\"ecef7238470a9acd\":\"Slack의 버그 보고를 모니터링하고, 조사를 진행하며, 간단한 수정은 PR로 반환하도록 에이전트를 설정하세요.\",\"ed37bda8af68155f\":\"Cursor는 이미 사용 중인 도구와 연동할 수 있는 플러그인을 제공합니다.\",\"edf6e1778ec264ee\":\"감사 로그 및 서비스 계정\",\"ee17d80657353e09\":{\"c\":\"게시물\",\"i\":1,\"t\":\"Link\"},\"ee3244aedb5dd281\":\"팀이 이미 주로 사용하는 곳에서 에이전트를 시작하세요.\",\"ee3e8bd8b7918aec\":\"검색\",\"ee9fa4bdf02f6ae3\":\"모든 작업에 가장 적합한 모델을 사용하세요\",\"ef530a2570e55063\":\"Tab과 Agent 사용량 패턴 분석\",\"ef58f1705a77fc03\":\"가벼운 커피 모임부터 주말 빌드까지, 전 세계에서 열리는 Cursor 이벤트의 모습을 소개합니다.\",\"ef61467b981b9cb0\":\"모델의 기반이 되는 연구와 벤치마크.\",\"ef6b646a293e47ca\":\"서비스 계정\",\"ef9f9e858b9d8404\":\"안심하고 배포하세요\",\"f057f51e79bab310\":[\"질문이나 아이디어가 있다면 \",{\"c\":\"community@cursor.com\",\"i\":1,\"t\":\"a\"},\"으로 이메일을 보내 주세요.\"],\"f061c0a9ed4c8f67\":\"Bugbot이 모든 PR을 팀의 규칙에 따라 검토합니다. 병합 전에 로직 버그, 보안 문제, 성능 문제를 잡아내세요.\",\"f06b2a51c6af5db7\":\"에이전트는 자체 컴퓨터를 사용해 기능을 처음부터 끝까지 만들고, 테스트하고, 데모를 진행해 리뷰할 수 있도록 합니다.\",\"f0744968f0e3d9fc\":\"grep하는 중\",\"f0b148dccfe70cae\":\"Next.js App Router\",\"f11c8516add083db\":\"menu-styles.css 읽음\",\"f12065a15c48bf72\":\"완료했습니다. 폰트는 head에서 미리 로드되고, 핵심 CSS는 인라인 처리되며, 다크 모드가 깜빡임 없이 즉시 렌더링되도록 color-scheme meta 태그를 추가했습니다. 첫 페인트는 280ms입니다.\",\"f12fe5d9110cf56f\":\"Cursor CLI를 사용해 보세요.\",\"f159bbcf008b372d\":\"Cursor의 연구원 Sasha Rush가 Dwarkesh와 함께 타깃 온폴리시 자기 증류를 설명합니다. Composer 2.5의 핵심 기법을 살펴보세요.\",\"f1673f149dbcccae\":\"어떤 모델이든 기반으로 구축하세요\",\"f190c495bd59583b\":\"항상 최신 모델을 이용하세요\",\"f1a768ffa4a2fa7b\":\"Cursor에게 무엇이든 계획하거나 만들도록 요청하세요\",\"f1b0bef65ca23bf2\":\"에이전트는 데스크톱, CLI, Web 전반에서 Cursor를 구동하는 것과 동일한 하네스를 사용합니다. 지능형 컨텍스트 관리, MCPs, 스킬, 훅, 하위 에이전트를 활용하세요.\",\"f1da0030cc8db163\":\"Jira용 Cursor는 어떻게 설치하나요?\",\"f2105001d47b1c0a\":\"Cursor와 함께하는 팀들을 만나보세요.\",\"f276f248408ec30e\":\"Cursor의 최신 소식\",\"f2891db360b8b967\":\"도구와 지식으로 확장\",\"f29ca02fdb652591\":\"팀이 일하는 모든 곳에서\",\"f2a0d4040c7bb0f1\":\"어느 순간 완전히 판이 바뀌었어요. 도입률이 한 자릿수에서 80%를 넘겼죠. 순식간에 들불처럼 퍼졌고, 최고의 빌더들은 모두 Cursor를 쓰고 있었습니다.\",\"f2aac01bc95e3e6a\":\"실행됨\",\"f2e393e1419f8c99\":\"문서\",\"f2e833d0c1a1a972\":\"app/globals.css +18 -0\",\"f3080a7959d8d22c\":\"시작 대기 중\",\"f332bd7ada621635\":\"프로그래머라는 일은 분명 더 재미있어지고 있습니다. 우리는 아직 가능한 것의 1% 지점에 있고, GPT-5 같은 모델은 Cursor 같은 대화형 경험에서 가장 빛을 발합니다.\",\"f333d3950450c1bf\":[{\"c\":\"Tab\",\"i\":1,\"t\":\"span\"},\"으로 \",{\"i\":2,\"k\":\"nextFileLabel\",\"v\":\"v\"},\"로 이동\"],\"f3561881f6a0cf3c\":\"감사합니다!\",\"f3643918072a00dd\":\"휴대폰으로 에이전트를 시작하고 모니터링하세요.\",\"f3716356b723ea30\":\"5분 전\",\"f3da4072ef887099\":\"CI/CD 파이프라인에서 에이전트를 직접 호출하고, 처음부터 끝까지 이어지는 워크플로우를 위한 자동화를 만들고, 제품에 에이전트를 통합하세요.\",\"f3dada4a22809ca7\":\"클라우드 Agent를 사용해 보세요.\",\"f4051250e5b9e7b7\":\"샌드박스된 클라우드 환경에서 에이전트를 실행해 새 프로젝트의 뼈대를 만들고 아이디어를 발전시킬 수 있는 웹 앱입니다.\",\"f4141a2262f87f7b\":\"엔지니어는 대화가 이뤄지는 바로 그곳에서 배포합니다.\",\"f4318b0970e298ba\":\"다음 단계에 대해 곧 연락드리겠습니다.\",\"f437eec258228f2c\":[{\"c\":\"GitHub Light\",\"i\":1,\"t\":\"option\"},{\"c\":\"Light+ (VS Code)\",\"i\":2,\"t\":\"option\"},{\"c\":\"Vitesse Light\",\"i\":3,\"t\":\"option\"},{\"c\":\"Min Light\",\"i\":4,\"t\":\"option\"},{\"c\":\"Solarized Light\",\"i\":5,\"t\":\"option\"}],\"f4a7c922bf1398be\":\"The Dwarkesh Podcast 청취하기\",\"f4a843c64fff263e\":\"모든 환경과 모든 컨텍스트를 아우르는 하나의 에이전트.\",\"f561bd2b332347ce\":{\"c\":[{\"c\":\"Agent 데모\",\"i\":2,\"t\":\"option\"},{\"c\":\"Tab 데모\",\"i\":3,\"t\":\"option\"},{\"c\":\"Cmd+K 데모\",\"i\":4,\"t\":\"option\"},{\"c\":\"Diff 리뷰\",\"i\":5,\"t\":\"option\"}],\"i\":1,\"t\":\"select\"},\"f580c09f38888227\":\"완벽합니다! 이제 자주 필요한 기능이니 translate 모듈에 ORF 탐색 기능도 추가하겠습니다:\",\"f589e1eef1cf5b37\":\"새 채팅\",\"f58c843c19d80fa9\":\"터미널에서 Cursor 에이전트를 실행할 수 있게 해주는 경량 CLI입니다.\",\"f5a0bb607155e019\":\"CursorBench 자세히 읽기\",\"f5c28ee4e3af909a\":\"Cursor Teams\",\"f5d896bc365390ca\":\"Tab은 다음 작업을 예측하고 변경 사항을 제안합니다.\",\"f6518abf8a6e65a5\":\"모든 사례 보기\",\"f678dd4cd15a09b1\":\"학생\",\"f67a333b8a82aac7\":\"이슈를 PR로 전환하도록 Cursor를 지정하세요.\",\"f6d020a752923cb5\":\"이 버그를 수정하세요...\\n\\n사용자 아바타 이미지 `src`(`marketing-static/icon-192x192.png`)에 앞쪽 슬래시가 빠져 있습니다. 이 상대 경로는 컴포넌트가 서로 다른 URL 컨텍스트에서 사용될 때 현재 페이지를 기준으로 해석되기 때문에 사이트 루트가 아니라 현재 페이지 기준으로 처리되어 이미지 로딩이 실패할 수 있습니다.\",\"f6d2240b69255017\":\"커밋 보기\",\"f6d9a9996e1cd228\":\"청구는 어떻게 되나요?\",\"f721fba3a8e760ca\":\"내 앱에 Stripe 체크아웃 구현\",\"f7e8de45ab83de3b\":\"영업팀에 문의하기\",\"f7ff9265a69905f1\":\"채용\",\"f80a5c3e306f98ff\":\"안전하고 규정을 준수하며 확장할 준비가 되어 있습니다.\",\"f84267cd34a42d65\":\"레이트 리미팅이 활성화되었습니다. 클라이언트는 X-RateLimit-Remaining 헤더를 받고, 429 응답에는 Retry-After가 포함됩니다. 슬라이딩 윈도우는 1분 동안 요청이 공정하게 분산되도록 보장합니다.\",\"f87dc6d18bc4e7dc\":\"세션 만료는 리프레시 토큰 변경 때문에 깨졌습니다.\",\"f8a3d2556c844acb\":\"Next.js App Router에서 동적 라우트를 어떻게 설정하나요?\",\"f8d19e80a7da9a2a\":\"에이전트를 실행했습니다. 완료되면 여기로 알려드리겠습니다.\",\"f8da380ed7bf92c0\":\"The Dwarkesh Podcast\",\"f91e23b992de82fd\":\"Web에서 수정\",\"f983189266f2e26a\":\"고객 사례\",\"f99897eb62688025\":\"기본적으로 켜짐\",\"f9a992bbdd19a827\":\"탁월한 생산성을 발휘하도록 설계된 Cursor는 최고의 코딩 에이전트입니다.\",\"f9b05cd47d2b0daa\":\"Slack에서 클라우드 Agent를 직접 실행하고 완료된 pull request로 돌아가세요.\",\"f9e9b0275cd246cb\":\"문서 페이지를 찾아냈습니다. 최신 릴리스 노트에서 핵심 신규 기능을 추출하겠습니다.\",\"fa4ce7816e5c163f\":\"Teams는 신용카드로 결제됩니다. 미리 할당된 좌석 수가 아니라 활성 멤버 수를 기준으로 비용을 지불합니다. 새 멤버가 참여하면 남은 기간에 비례해 요금이 청구됩니다. 온디맨드 에이전트 사용량은 청구 주기 말에 월별로 청구됩니다. 온디맨드 지출이 변동형 지출 한도를 초과하면 월말 전에 추가 요금이 분할 청구될 수 있습니다.\",\"fa5915c3fa01046d\":\"최고의 엔지니어 설정을 모두에게\",\"faa3f67be31bfeca\":\"다크 테마\",\"fae786aaae936b98\":{\"c\":\"변경 사항 적용\",\"i\":1,\"t\":\"button\"},\"fb397fb9df1383c3\":\"공유 스킬, 규칙, 자동화로 핵심 사용자의 역량을 확장하세요\",\"fb5b2d30e359d2e3\":\"SupportChat.tsx +48 -20\",\"fbad88e70550b379\":\"익숙한 하나의 에디터에서 직접 코딩부터 에이전트 기반 코딩까지.\",\"fbdd56c6ffb1eb6e\":\"The Dwarkesh Podcast는 미래를 탐구합니다. Cursor는 그 미래를 만들어 가는 데 도움을 주는 코딩 에이전트입니다.\",\"fc5116615b6a8101\":\"어떤 터미널, 스크립트, CI 파이프라인에서든 에이전트를 실행하세요.\",\"fcc675dbe55a5611\":\"작성자\",\"fce467a1bcfa492a\":\"지오펜스 검증, Result 기반 오류 처리, 플루언트 빌더 API를 사용해 차량 매칭용 디스패처 패턴 구현\",\"fd000d6a450ba41b\":\"대규모 조직을 위해\",\"fd5f046f0f70edbc\":\"{site}에서 읽기 ↗\",\"fd63fffe51680c58\":\"Tab\",\"fd761a4786b2cfa9\":\"App Router 문서를 읽는 중\",\"fda1543fcba5a5fe\":\"Cursor 이벤트는 편안하게 협업할 수 있는 캐주얼한 공간입니다. 노트북과 지금 작업 중인 것을 가져오세요. 다른 개발자들을 만나 커피와 Cursor 크레딧을 받고, 함께 만들어갈 수 있습니다. 발표나 정해진 공식 아젠다는 필요하지 않습니다.\",\"fdca7896fc167768\":\"대시보드의 Cursor 통합에서 해당 통합을 설치하세요. Cursor 관리자 액세스 권한과 Rovo가 활성화된 Jira Commercial Cloud가 필요합니다. 자세한 안내는 Jira 통합 문서에서 확인할 수 있습니다.\",\"fe535642bfd93c53\":\"Cursor 시작하기\",\"fe7392b6b873de4c\":\"Cursor for Teams\",\"fe8a2b90c775ad88\":\"추천\",\"ff0427c4b3b3d0ae\":\"GitHub Actions\",\"ff545ba23dc2c350\":\"읽는 중\"},\"locale\":\"ko\",\"locales\":[\"en-US\",\"cn\",\"ja\",\"zh-Hant\",\"es\",\"fr\",\"pt-BR\",\"ko\",\"de\",\"hi\"],\"defaultLocale\":\"en-US\",\"translationRequired\":true,\"dialectTranslationRequired\":false,\"region\":\"$undefined\",\"environment\":\"production\",\"gtServicesEnabled\":true,\"projectId\":\"prj_jdh3imw75wenlfdi2jf1n41k\",\"translationEnabled\":true,\"runtimeUrl\":\"https://runtime2.gtx.dev\",\"devApiKey\":\"$undefined\",\"dictionaryEnabled\":true,\"renderSettings\":{\"method\":\"default\",\"timeout\":12000},\"developmentApiEnabled\":false,\"localeRoutingEnabledCookieName\":\"generaltranslation.locale-routing-enabled\",\"referrerLocaleCookieName\":\"generaltranslation.referrer-locale\",\"localeCookieName\":\"generaltranslation.locale\",\"resetLocaleCookieName\":\"generaltranslation.locale-reset\",\"customMapping\":{\"cn\":{\"code\":\"zh\"}},\"_versionId\":\"a3365390c4b153b566f9871c3ea99a34d839a042f0d732fcd1d882ff755ab3fc\",\"chil
