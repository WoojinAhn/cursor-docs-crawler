는 /api/metrics/[period]입니다.\",\"009705a340687c13\":\"웹 탐색\",\"010e512bb66b88c6\":\"랜딩 페이지 만들기\",\"014e72a2b100246d\":\"components/Dashboard.tsx, components/Navigation.tsx, components/ContentTabs.tsx 읽기\",\"017d93b20cd67836\":\"Cursor는 어떤 Slack 권한을 요청하나요?\",\"019869a6c0157892\":\"서비스 약관\",\"01a78922e94e2f5e\":\"어디에서 코딩하든 Cursor CLI는 기존 워크플로우에 자연스럽게 통합됩니다.\",\"021e0af7480aacc1\":\"팀의 업무 방식에 맞게 Cursor를 맞춤 설정하세요\",\"026e0133ddc5b240\":\"7초간 생각함\",\"02f220673d79b09b\":\"updateInventory grep 완료\",\"0302bd1957d84529\":\"Bugbot의 적중률은 놀라울 정도입니다. 버그를 초기에 잡아내면 나중에 발생할 수 있는 큰 비용을 절감할 수 있습니다.\",\"0444cc925fff818d\":\"사용량 가시성 없음\",\"044d0639bddf25c3\":\"리포지토리, 모델 및 MCP 액세스 제어\",\"045741aa62df51f8\":\"전체\",\"0517f6325c5bb7f6\":\"스레드에서 @Cursor를 멘션해 전체 컨텍스트와 함께 작업을 위임하세요.\",\"05352823306f0edd\":[\"예정된 모든 Cursor Cafes, 밋업, 워크숍은 \",{\"c\":\"Luma 캘린더\",\"i\":1,\"t\":\"a\"},\"에 나와 있습니다. 가까운 지역에 새 이벤트가 추가되면 알림을 받도록 구독할 수 있습니다.\"],\"0570606078e641c8\":\"첫 번째 자동화 만들기\",\"057236a0a0f7235d\":\"최고 수준의 모델에 접근\",\"05a5d77f162be573\":\"SCIM 사용자 프로비저닝\",\"05c75fb690768c76\":\"Headless CLI 사용하기\",\"061357d71ac13fb6\":\"작성자: {name}\",\"0620c34158fe0b46\":{\"c\":\"스토리 읽기 →\",\"i\":1,\"t\":\"ResolvedLink\"},\"063b2f78b38bbd80\":\"채널별 기본값을 설정하고, 키워드를 적절한 repo로 라우팅하며, 개인정보 보호 제어는 직접 유지할 수 있습니다.\",\"06cebfc340f757fd\":\"체크아웃 페이지 디버그\",\"0701c6f018274237\":\"스마트 repo 및 모델 라우팅\",\"0735ce53a3a2f5b4\":\"더 보기\",\"0751d36957cf9b2a\":\"lgtm @cursor 머지해줘\",\"075bb4f8e3113243\":\"6초간 생각함\",\"07939f34549c6e15\":\"Cursor 이벤트에 가면 어떤 경험을 할 수 있나요?\",\"07dec9ca61a08fde\":\"설치 없이 브라우저에서 클라우드 Agent를 실행하세요.\",\"080502143f3f3a09\":\"Cursor를 어떻게 사용하려고 하시나요?\",\"080c4edc84be87b0\":\"Cursor CLI 시작하기\",\"08cbda9f66186976\":\"제한된 Tab 자동 완성\",\"098bfc2c61b023de\":\"제가 지금 돈을 내고 쓰는 AI 도구 가운데 단연 가장 유용한 건 Cursor입니다. 빠르고, 필요할 때 필요한 곳에서 자동 완성을 해주고, 괄호도 제대로 처리하고, 키보드 단축키도 합리적이고, 자체 모델도 사용할 수 있고... 모든 게 정말 잘 갖춰져 있습니다.\",\"09cd7427e471ed64\":{\"d\":{\"b\":{\"other\":{\"c\":[{\"c\":{\"i\":4,\"k\":\"_gt_n_4\",\"v\":\"n\"},\"i\":3,\"t\":\"span\"},{\"c\":\"개의 답글\",\"i\":5,\"t\":\"span\"}],\"i\":2,\"t\":\"C2\"},\"plural\":{\"c\":[{\"c\":{\"i\":4,\"k\":\"_gt_n_4\",\"v\":\"n\"},\"i\":3,\"t\":\"span\"},{\"c\":\"개의 답글\",\"i\":5,\"t\":\"span\"}],\"i\":2,\"t\":\"C2\"},\"singular\":{\"c\":[{\"c\":{\"i\":4,\"k\":\"_gt_n_4\",\"v\":\"n\"},\"i\":3,\"t\":\"span\"},{\"c\":\"답글\",\"i\":5,\"t\":\"span\"}],\"i\":2,\"t\":\"C2\"}},\"t\":\"p\"},\"i\":1,\"t\":\"Plural\"},\"09e1baafad0af281\":\"Cursor와 산업 AI 협회는 에이전트 기반 산업용 소프트웨어와 제품 엔지니어링 분야에서 협력하고 있습니다.\",\"0a863e23682fd778\":\"2초간 생각함\",\"0b1d1692895304cf\":\"Teams 시작하기\",\"0b5ca3c7f0b909ac\":\"빌드하고 테스트 실행\",\"0b8ea8767d109318\":\"AI 코드 추적 API\",\"0be55ba5b238b54f\":\"비즈니스 플랜\",\"0c0048059797ade0\":\"사용자 접근 제어\",\"0c063904b2116ab1\":\"저는 평생 IntelliJ 진영의 사람이라고 생각해 왔지만, 이제는 Cursor의 열렬한 팬이 되었습니다. 전반적인 엔지니어링 속도는 2~5배 빨라졌고, 기술 부채 해소, 코드 리팩터링, 단위 테스트, 그리고 몇 주가 아니라 몇 시간 만에 아이디어를 프로토타이핑하는 능력도 크게 향상되었습니다.\",\"0c096eec95ccebed\":\"PR을 자동으로 리뷰하고 잠재적인 문제에 댓글을 남겨, 버그가 프로덕션에 반영되기 전에 수정할 수 있게 합니다.\",\"0c1c3c83a17f1148\":\"Premium\",\"0c6d41646ebf7963\":\"Cursor 기업 살펴보기\",\"0c72523f35c36b7f\":\"@Cursor Git URL 유틸리티 함수 검사용 단위 테스트 추가\",\"0c7d0f9e64cfeb51\":\"계속 살펴보기\",\"0c808b8028e9043c\":\"네. Privacy Mode를 지원합니다. Cursor와 LLM 제공업체는 고객님의 데이터를 학습에 사용하지 않습니다. 또한 외부 멤버가 있는 Slack Connect 채널에서 에이전트 요약을 표시할지도 제어할 수 있습니다. 클라우드 Agent는 실행 중에 임시 코드 저장소가 필요하므로 Privacy Mode (Legacy)는 지원되지 않습니다.\",\"0cb50ac22851134f\":\"3초간 생각함\",\"0d349228d3846747\":\"작업 범위를 정할 때 Cursor는 어떤 컨텍스트를 사용하나요?\",\"0d381d934f1c8d7e\":\"전 세계 최고의 개발자들이 신뢰하는 제품\",\"0d3bbb837c0d96d8\":\"웹 및 모바일\",\"0d7be5f51183eca2\":\"SDK의 클라우드 에이전트는 Cursor의 클라우드 Agent와 동일한 런타임을 사용합니다. 다른 런타임이 필요하다면 동일한 SDK를 로컬 또는 자체 호스팅 환경에서도 실행할 수 있습니다.\",\"0d820e74fe415fc2\":\"문서 읽기\",\"0d83261899df73c2\":\"개발의 미래를 함께 만들어가세요! Ambassador는 우리 생태계를 더 활기차고 협력적인 커뮤니티로 만드는 데 기여합니다.\",\"0d871ed82140a33c\":\"https://nextjs.org/docs 여는 중\",\"0d97f9c66db79593\":\"이름\",\"0d996d48ed2da685\":\"클라우드 Agent는 자체 컴퓨터를 제어해 야심찬 소프트웨어를 구축합니다.\",\"0dc00cb6c2595ad0\":\"cursor.com/team/new-team\",\"0e38ebf4df211f43\":\"이 폼을 사용해 영업팀에 문의하실 수 있습니다. 관심 가져 주셔서 감사합니다.\",\"0e889966aa0da646\":\"모델 접근, MCP 제어, 시스템 전반의 에이전트 규칙을 전역으로 설정하세요.\",\"0ea1553d4f713ff5\":\"각 좌석에는 1인당 월 $20 이상의 에이전트 사용량이 최소한 포함되며, 매 청구 주기마다 초기화됩니다. 이를 초과하는 사용량은 공개 API 정가에 Cursor 토큰 요율을 더한 온디맨드 방식으로 청구됩니다.\",\"0ecfb5780a0ed42b\":\"팀 교육 요청하기\",\"0ef5e4afce113012\":\"Cursor의 최신 업데이트를 확인하세요.\",\"0efde7eab6950270\":\"고객 사례\",\"0f18c24c479c5e44\":\"AMP와 결과 분석을 사용해 PyTorch MNIST 실험 실행\",\"0f2527dae52b4642\":\"이커머스 대시보드 만들기\",\"0f25e71bb01cc7b1\":\"대규모 환경에서도 오래 지속되는 소프트웨어를 개발하세요\",\"0f561950a1bff871\":\"Cursor 기업 시작하기.\",\"0f614a25abb9b06a\":\"Bugbot의 리뷰 방식을 맞춤 설정할 수 있나요?\",\"0f8421715298256c\":\"포럼 방문하기\",\"0faf657712a9d10a\":\"플랜\",\"0fce019bf9c57475\":[{\"c\":\"GitHub Dark\",\"i\":1,\"t\":\"option\"},{\"c\":\"Dark+ (VS Code)\",\"i\":2,\"t\":\"option\"},{\"c\":\"Nord\",\"i\":3,\"t\":\"option\"},{\"c\":\"Rosé Pine\",\"i\":4,\"t\":\"option\"},{\"c\":\"One Dark Pro\",\"i\":5,\"t\":\"option\"},{\"c\":\"Dracula\",\"i\":6,\"t\":\"option\"},{\"c\":\"Monokai\",\"i\":7,\"t\":\"option\"},{\"c\":\"Vitesse Dark\",\"i\":8,\"t\":\"option\"},{\"c\":\"Min Dark\",\"i\":9,\"t\":\"option\"},{\"c\":\"Solarized Dark\",\"i\":10,\"t\":\"option\"}],\"0fef8deb0811c604\":\"채용\",\"102fbe92ac5e33b6\":\"demo 다시 보기\",\"103a62614f8598df\":\"Cursor로 반복 작업을 자동화하세요.\",\"1044788f1df495c5\":\"오류가 발생했습니다. 다시 시도해 주세요.\",\"105236735d527307\":\"MDM 배포\",\"10b2a727cf9748a0\":\"팀이 더 높은 수준의 방향 설정에 집중하는 동안 구현은 Background Agent에 맡기세요. 멀티 에이전트 워크플로우를 활용하면 몇 주 걸리던 작업을 며칠로 줄일 수 있습니다.\",\"1106f2d99ebeee36\":\"코드가 어떻게 변경되어 왔는지 확인하고, 언제든 이전 스냅샷으로 되돌릴 수 있습니다.\",\"110ede0a7f2c004e\":\"모든 워크숍 보기\",\"1129129dcbac5c24\":\"GitHub에서 풀 리퀘스트를 열고 검토하세요.\",\"1130dfe0ca538f12\":\"다음과 같은 기업의 엔지니어링 팀이 신뢰합니다\",\"115f319d56bc136b\":\"사용자 설정에 따라 다음 단계 계획 중\",\"11930106846e26be\":\"자동으로 실행\",\"11e5b92501e978f9\":\"고품질 제품을 배포하는 팀들이 신뢰하는 선택.\",\"123e6988cd2e7d98\":\"main에 머지했습니다.\",\"126a2f2821b99142\":\"12초간 생각함\",\"126d48d2163cc3ff\":\"영업팀에 문의하기\",\"1282cf10745d2596\":[{\"c\":\"찾으시는 페이지가 사라졌지만, 걱정하지 마세요!\",\"i\":1,\"t\":\"p\"},{\"c\":\"원래 하시던 작업으로 다시 돌아가실 수 있도록 도와드릴게요.\",\"i\":2,\"t\":\"p\"}],\"129191fef1e38159\":\"다운로드 가이드\",\"129fac7366443c00\":\"모든 팀이 수정 가능\",\"12d03024b489f5be\":\"브랜드\",\"133f04c24b836d85\":\"파일 탐색기와 구문 강조 표시를 갖춘 Cursor IDE 데모를 만들었습니다\",\"13c358b4aeea450c\":\"AI는 소프트웨어가 만들어지는 방식을 바꾸고 있습니다.\",\"13d9a5926cecdbeb\":\"직접 비교 평가에서 엔지니어의 93%가 선호하는 AI 코딩 도구로 Cursor를 선택합니다.\",\"13e5cf3f011db0da\":\"통합 시작하기\",\"13f0b8b4274e1b49\":\"커뮤니티를 만나보세요\",\"14613292a64ced76\":{\"c\":\"빠른 전환:\",\"i\":1,\"t\":\"span\"},\"147ffbbb322e4d8a\":\"기존 컨텍스트를 Cursor에 제공하고 맞춤 기능을 추가하세요.\",\"14f6a8e1cb34569a\":\"클라우드 Agent\",\"14fb80e79f058d36\":\"Privacy Mode\",\"1532cdd8a1e9bdec\":\"문제없어 보여요\",\"15360e22a6defd23\":\"터미널에서 바로.\",\"158c454e7818dd18\":\"Optiver는 최근 Cursor 사용을 전사 배포로 확대했습니다. 우리 팀은 Cursor가 글로벌 트레이딩 기업의 규모와 복잡성을 뒷받침할 만큼 견고하고, 컨텍스트를 잘 이해하며, 유연하다는 점을 꾸준히 확인해 왔습니다.\",\"1590a31a24434712\":\"동적 라우트의 핵심 기능:\\n\\n• **Parameters**: `params` prop을 통해 라우트 매개변수에 접근\\n• **Static Generation**: `generateStaticParams`를 사용해 페이지를 사전 렌더링\\n• **Nested Routes**: 레이아웃 파일과 결합 가능\\n• **Catch-all**: 여러 세그먼트에는 `[...slug]` 사용\\n\\n`/blog/my-post` 경로는 이 패턴과 일치하며 `params.slug`는 `'my-post'`가 됩니다.\",\"15cd186f0b3f3b07\":\"에이전트가 정기적으로 데이터 업데이트를 공유하고, 코드베이스 다이제스트를 생성하며, 문서를 업데이트합니다.\",\"15e4a8481fd5c063\":\"무엇을 도와드릴까요?\",\"166661f94b300f5b\":\"완료\",\"16ad0acfe286ec0a\":\"SCIM을 통해 배포 범위를 지정하고 접근을 제한\",\"16ca5c362c96b0bb\":\"다음 동작 예측.\",\"17164bbc3bb0a1d9\":\"다른 Cursor 사용자들과 소통하세요.\",\"1738f499d0c9cf60\":\"리서치\",\"17503a24f3657b87\":\"저희는 Cursor SDK를 기반으로 코딩 에이전트 인프라를 구축하게 되어 매우 기대하고 있습니다. 여기에는 Slack 봇, 고객 지원 자동화, 그리고 당사 내부 Background Agent를 위한 하네스가 포함됩니다. 런타임과 모델에 유연하게 접근하면서 Cursor 에이전트 전체에 프로그래밍 방식으로 접근할 수 있게 되면서, 워크플로우마다 서로 다른 인터페이스를 따로 연결하는 대신 배포를 통합할 수 있게 되었습니다.\",\"178f5865c2b3a42f\":\"코드베이스 인덱싱 살펴보기\",\"17c2753c2cbe7322\":\"Cursor는 규모나 복잡성과 관계없이 코드베이스가 어떻게 동작하는지 학습합니다.\",\"17d8ba525326ba71\":\"무료\",\"17ed772aade6d804\":\"읽기\",\"18a7ca064ba1c8c3\":\"다음 학교의 학생들이 매일 사용합니다\",\"18b52a73cbe6ca8c\":\"components/ChatMessage.tsx 읽기\",\"18f71a4dede4311a\":\"읽는 중\",\"190bcb4243c71a44\":\"에이전트 중심으로 일하는 분들을 위해\",\"193bda6a94fecc26\":\"공유 사용량\",\"193c27ac4d20d97c\":\"CLI\",\"19d409e0bb1063ac\":\"개별 워크플로우를 팀이 함께 사용하는 인프라로 바꾸세요.\",\"19edf136130ef3da\":\"사용자 수\",\"1a69170d892d1e8f\":\"제출 중...\",\"1acfe6b95c77a499\":\"실험을 쉽게 실행할 수 있도록 명령줄 실행 스크립트를 만들겠습니다:\",\"1b483159a62f8f71\":\"마켓플레이스\",\"1b767a5b7e0073da\":\"브라우저나 휴대폰에서 Cursor를 실행하세요. 클라우드 Agent는 자체 컴퓨팅 환경을 제어하며 대규모 소프트웨어를 구축합니다.\",\"1b95b4d8aa018299\":[{\"c\":\"모바일 Cursor 에이전트 데모\",\"i\":1,\"t\":\"h1\"},{\"c\":\"모바일 기기에서 AI 기반 지원을 보여주는 Cursor의 모바일 에이전트 인터페이스 인터랙티브 데모입니다.\",\"i\":2,\"t\":\"p\"}],\"1bae2c44c63e6c40\":\"현재 health 엔드포인트는 서비스가 살아 있는지만 확인합니다. 응답 시간 메트릭을 추가합니다:\",\"1bbfd506511ac9d7\":[{\"c\":\"캠퍼스 뉴스레터를 구독하고\",\"i\":1,\"t\":\"a\"},\" 예정된 이벤트 얼리 액세스, 특별 할인, 입문 가이드를 받아보세요.\"],\"1c4e7ffd651ae5d5\":\"문제를 찾았습니다! 체크아웃 API 호출이 POST 대신 GET을 사용하고 있고, 장바구니 항목도 요청 본문에 전송되지 않고 있습니다. API가 405 Method Not Allowed 오류를 반환하고 있습니다.\\n\\n장바구니 데이터를 올바르게 POST하도록 `handleSubmit` 함수를 수정하겠습니다:\",\"1c7eb83ed13b21b0\":\"Blog\",\"1d0ea2743837d731\":\"Cursor에서 수정\",\"1db881229ff7daf0\":\"엔지니어별 에이전트 설정으로 관리가 복잡해집니다\",\"1e8ecc3e09a7c510\":\"모델 살펴보기\",\"1ea6526b14e4170e\":\"팀의 소프트웨어 개발 방식을 혁신하세요.\",\"1ed3de800becb130\":\"보고서 사본과 Teams 평가판 이용 방법에 대한 정보가 담긴 이메일을 확인해 주세요.\",\"1f266c4baff96f60\":\"현재 예정된 워크숍이 없습니다.\",\"1f41c8bde7d3cd8c\":\"안전 점검과 출력 표시 기능을 통해 에이전트에서 직접 셸 명령을 실행하세요.\",\"1f57dde5f8d583ba\":\"팀 전반에서 사용하는 Bugbot, 클라우드 에이전트, 자동화\",\"1f87f354dab3ab46\":\"보안에 대해 알아보세요\",\"1fa6d65ca414c680\":\"요금제 페이지\",\"1fe3b8b7905a7df1\":\"brand-guidelines.pdf 읽기\",\"204167c06dc9fb6e\":\"상태\",\"20815fef57ab15f0\":\"치명적인 버그 찾아내기 → 수정안 만들기\",\"20a275a3df633dbf\":\"diff 대신 데모\",\"20cc2055c35d0f22\":\"notebooks/train_model.py 읽기 (현재 구현)\",\"20edf4cce8e91b95\":\"최고의 엔지니어가 쓰는 설정을 모두에게 적용\",\"2152482e32a80707\":\"새 커밋을 분석해 심각한 버그를 찾아내고 안전한 수정 사항을 제출하는 자동화를 만드세요.\",\"21967c1e688f4e74\":\"팀 전체 Privacy Mode\",\"21a97c4017e31a49\":\"src/domain/ride.rs, src/geo/mod.rs 읽기\",\"21b9a8bf7d73d803\":\"시스템 테마\",\"21f359f0de820ba6\":\"Fortune 500 기업의 절반 이상이 안전하게 대규모 개발을 가속화하기 위해 신뢰하는 솔루션입니다.\",\"22439bb8cd01a52f\":\"안전한 사용자 접근을 위한 SAML 기반 SSO 통합.\",\"22443d8b4d9fe0d0\":\"새로운 업데이트와 개선 사항.\",\"224b6eecfd42b515\":\"Blog\",\"22905d413a63bd5b\":\"맞춤형 임베딩 모델은 대규모 코드베이스 전반에서 에이전트에 동급 최고 수준의 재현율을 제공합니다.\",\"22a304da415a1b25\":\"Cursor Campus Lead가 되세요\",\"22b99825e8a1eb24\":\"자세히 알아보기\",\"22c87218af6cf041\":\"{fileName} 열기\",\"236ee66b15293aea\":\".cursor/rules/*.mdc 파일 읽기\",\"23987d2259b47dad\":\"공개 채널마다 기본 리포지토리와 기본 브랜치를 설정하면 팀원들이 둘 중 어느 것도 지정하지 않고 @Cursor를 멘션할 수 있습니다.\",\"23c94233c50f0867\":\"취미용\",\"23dee9aef1be0948\":\"기업 관리자(Enterprise admins)는 역할별 권한을 설정하고, 리포지토리, 모델, MCP 서버에 대한 허용 목록 또는 차단 목록을 지정하며, 전역 에이전트 실행 설정을 설정할 수 있습니다.\",\"23e099a30844e1ee\":\"Bugbot은 특히 규모가 큰 PR을 리뷰할 때 매우 유용합니다. Bugbot이 생성하는 요약은 실제 코드 변경 사항을 정확하게 설명합니다. 사람이 코드 리뷰에서 놓친 구현 오류를 Bugbot이 잡아내는 것도 봤습니다.\",\"23f664c064cfb6b2\":\"분석 대시보드는 관리자만 접근 가능\",\"243a30e57151b032\":\"역할과 직급 전반에 걸쳐 PR 수는 25% 이상, 평균 PR 크기는 100% 이상 증가했습니다. 이를 종합하면, 우리는 약 50% 더 많은 코드를 배포하고 있다는 의미입니다.\",\"245c34b6a30df38f\":\"빌드\",\"24912a9c16e05498\":\"개발자들이 사랑하는 제품\",\"249997196e8fcb18\":\"Cursor의 특화된 Tab 모델은 다음 동작을 놀라운 속도와 정확도로 예측합니다.\",\"24d78136d35c8310\":\"추천 플랜\",\"250716628e9cbe4d\":\"세계 최고 수준의 팀들이 매일 신뢰합니다\",\"2538c2d97c9b5e23\":\"진행 중\",\"25be61b57b4924d0\":\"하위 에이전트가 병렬로 실행되며 코드베이스를 살펴보고, 각 에이전트는 작업에 가장 적합한 모델을 사용합니다.\",\"26205fd1b4454824\":\"Slack 및 Microsoft Teams\",\"262b6fc7fc66c7de\":\"전체 보기\",\"2630e7b58f5f271b\":\"계속\",\"2632f324dc2d9c48\":\"에이전트\",\"26389167fa52d341\":\"최신 주요 업데이트\",\"263999ebe15be0d0\":\"글로벌 규정 준수 및 보안 인증\",\"264a534b63a703c3\":\"리셀러나 타사를 통해 Cursor를 구매할 수 있나요?\",\"26859ccb4f0c22f8\":\"Cursor 덕분에 웹 개발 경험이 없던 학생들도 이제 수십만 명의 연구자가 사용하는 애플리케이션인 alphaXiv를 빠르게 만들 수 있게 되었습니다.\",\"268cd4299d184cb9\":\"여러 줄 수정, 파일 간 이동, 코드베이스 전반에 영향을 미치는 리팩터링.\",\"269f12f59c04e25e\":\"전 세계 학생들이 AI로 코딩하는 방식.\",\"26afe1c2ac971108\":\"자주 묻는 질문\",\"2797fc138ccd4a69\":\"app/page.tsx +52 -0\",\"27db937cba80a4da\":\"Teams\",\"2852037b91615e74\":\"야심 찬 팀을 위한 코딩 에이전트.\",\"286799383e9ee00e\":\"바로 병합할 수 있는 PR 시작하기\",\"2871d92f80fa4910\":\"탐색 열기\",\"288444ddbb0804d5\":\"Auto-run, 브라우저 및 네트워크 제어\",\"28a6e9345c35fe69\":\"Cursor 관리자 액세스 권한과 Rovo가 활성화된 Jira Commercial Cloud가 필요합니다.\",\"28aadb8b0fa9ff77\":\"제품\",\"28b8a5ff2c994d23\":\"캘린더를 불러오는 중...\",\"28d9d35874b5e3f1\":\".add-to-cart 버튼 요소 읽기\",\"2915a272ff411af7\":\"예. Okta, Azure AD, Google Workspace 등 주요 IdP를 지원합니다. 관리자는 SSO를 강제하고, 로컬 로그인을 비활성화하며, SCIM을 통해 사용자를 프로비저닝하거나 프로비저닝 해제할 수 있습니다.\",\"2915edddbb99ce17\":\"도메인 지식을 추가해 Cursor가 특화된 프롬프트와 코드를 찾아 실행할 수 있게 하세요.\",\"293cecd06c136d07\":\"전체 에이전트 스택을 직접 만들고 유지 관리하는 부담 없이 에이전트를 구축하세요.\",\"2a3012c0c74b4dca\":\"도메인 레이어의 기존 RideRequest 및 geo 타입을 검색했습니다\",\"2a3c29b646342f39\":\"팀 만들기\",\"2a551f2951953cfb\":\"Cursor SDK로 프로그래밍 방식의 에이전트를 구축하세요\",\"2a9faae8db103f7e\":\"엔지니어링 팀 전체에서 동일한 도구와 권장 사항을 표준화하세요.\",\"2ac3c0a8906e5cb1\":\"**버그: 함수가 문자열 대신 객체를 반환함(로직 버그)**\\n`composerOpenModeToggleKeybinding`는 값을 가져오려면 호출해야 하는 함수입니다. 그래서 이 조건은 항상 참으로 평가됩니다.\",\"2b01f3f4e07b7e05\":\"선호하는 IDE에서 사용하세요\",\"2b0c8e42ef395da5\":\"app/dashboard/page.tsx +84\",\"2b9119d7a856c165\":\"나에게 맞는 플랜 선택하기\",\"2b946ae68a8bddc8\":\"여러 모델\",\"2b9ca3266edb8642\":\"Cursor나 LLM 제공업체는 고객 데이터를 학습에 사용하지 않습니다. 외부 멤버가 있는 Slack Connect 채널에 에이전트 요약을 표시할지 제어할 수 있습니다.\",\"2c095b47f573462f\":\"Cursor Agent를 사용해 보려면 [Cursor를 다운로드]({link})하세요.\",\"2c1843519c94014f\":\"팀 마켓플레이스 1개\",\"2c54b8a76b4f2d72\":{\"c\":\"배경\",\"i\":1,\"t\":\"span\"},\"2c6e8f4284c59baf\":\"Cursor는 훨씬 짧은 시간에 더 많은 일을 해낼 수 있게 도와주고, 프런트엔드의 사소한 문제에 매달리는 대신 성능 튜닝과 인터페이스 디자인처럼 제가 가장 즐기는 일에 집중할 수 있게 해줍니다.\",\"2cb8572680e61a03\":\"감사합니다\",\"2d30a660ba311bdb\":\"에이전트가 자율적으로 인시던트를 조사하고, 버그를 탐지·수정하며, 테스트를 생성합니다.\",\"2d5f1ed27063382d\":\"Cursor는 판도를 바꿔 놓았습니다. 단순히 코드를 작성하는 데 그치지 않고, 라이브러리와 권장 사항, 구현 전략까지 스스로 조사해 냅니다. 마치 언제든 도움을 받을 수 있는 어시스턴트가 곁에 있는 느낌입니다.\",\"2d8b0218c89a3472\":\"상품 페이지에서 'Add to Cart' 버튼이 사라졌습니다.\",\"2ddaf5fa16e7e8a6\":{\"c\":\"기능\",\"i\":1,\"t\":\"label\"},\"2ddcdb83267c1e45\":\"검색 중\",\"2e2287d661aae72a\":\"affine gap alignment를 추가하세요. 현재는 기본적인 NW alignment만 있는데, indel을 더 잘 처리하려면 Gotoh 알고리즘이 필요합니다. 그리고 FASTA parser도 수정하세요.\",\"2e65adda08f68610\":\"강력한 데이터 보호\",\"2e7057bc1f618169\":\"Cursor Teams 시작하기.\",\"2e904a9990381ecb\":\"팀 전체에서 일관된 패턴을 적용할 수 있도록 Next.js 대시보드 앱용 Cursor Rules를 설정하세요\",\"2eb39a53ad7f7c34\":\"제품\",\"2eb3a76273535c21\":\"팀 전체의 역량을 끌어올리세요\",\"2ec70609f6be4c14\":\"좋습니다. 어떤 스택을 생각하고 있나요?\",\"2ed50cabd08367a2\":\"코드 품질 향상\",\"2f339de5a1484382\":\"이제 geo 모듈에 하버사인 거리 계산과 지오펜스 검증을 추가하겠습니다:\",\"2f583b3ba59a53af\":\"저희가 자부하는 점 중 하나는 엔지니어가 입사 첫날에도 PR을 배포할 수 있다는 것입니다. 사람들이 Cursor를 쓰기 시작하면 진입 장벽과 도입 장벽을 낮춰 둔 덕분에 최적의 경험을 하게 됩니다.\",\"30589efe06e4d26f\":\"방금 전\",\"3096009ed234ce28\":\"Opus나 GPT만으로는 AGI의 순간을 실감하지 못했지만, Cursor에서 사용해 보고 나서는 달라졌습니다. 그 후로 코딩 에이전트에 대한 기대치가 너무 높아져서, 다른 코딩 하네스에서 그 모델들을 쓰는 것은 더 이상 견디기 어려워졌습니다.\",\"30cc3b0b7c5223f9\":\"Teams\",\"30e602443b55cd97\":\"티켓에서 pull request까지.\",\"316101379dc1416c\":\"방금\",\"31650c11719643c3\":\"태그 데모\",\"316d18e019311efa\":\". 이름과 청구 주기를 선택한 다음 대시보드를 열어 초대 링크를 복사하거나 이메일 초대를 보내세요. 누군가 참여하면 청구 대상 좌석이 추가됩니다. 청구 주기에 남아 있는 일수만큼 비례 계산되어 요금이 청구됩니다.\",\"316dc2e57cfbd764\":\"Cursor는 수백 명의 열성적인 Stripe 직원들 사이에서 빠르게 수천 명 규모로 확산되었습니다. 우리는 다른 어떤 분야보다도 R\u0026D와 소프트웨어 개발에 더 많이 투자하고 있으며, 그 과정을 더 효율적으로 만들면 경제적 효과도 상당합니다.\",\"322b3925cb3d4a01\":\"Cursor에 어떤 작업을 요청할 수 있나요?\",\"3230203820653db1\":\"Changelog\",\"32392ff86819f0d0\":\"사용자가 자신의 API 키를 사용하지 못하도록 설정\",\"324d9a22a9f40d97\":\"AppManager.tsx 읽기\",\"32881d87c7f08d58\":\"저는 Cursor의 정말 큰 팬입니다. 제가 사랑해 왔고 제 삶의 열정이기도 했던 일이, 이 AI 도구를 통해 소프트웨어를 만드는 방식으로 어떻게 바뀌어 가는지 지켜보는 것은 즐거운 일입니다.\",\"32c06f55ac5af03a\":\"저희 팀과 커뮤니티로부터 답변을 받아보세요.\",\"3310bb07c2699513\":\"규모와 관계없이 코드베이스를 이해합니다\",\"3317e6ad9030ac0b\":\"CursorBench 3.1은 더 어렵습니다\",\"331d202443ac4375\":\"자동 완성을 넘어\",\"33491e72172b82ae\":\"lib/inventory.ts +14 -6\",\"33771bd783d6980b\":\"좋습니다! 다음을 추가했습니다:\\n\\n1. 적절한 affine gap penalty(갭 오픈: -10, 확장: -1)를 적용한 **Gotoh 알고리즘**\\n2. 여러 줄 시퀀스를 처리하고 공백/숫자를 정리하는 **수정된 FASTA 파서**\\n3. 세 개의 frame 전체에서 시작/종결 코돈을 검색하는 **ORF finder**\\n4. 양쪽 가닥을 모두 검색하기 위한 **reverse complement** 함수\\n\\nGotoh 구현은 세 개의 행렬(M, X, Y)을 사용해 match/mismatch와 gap 상태를 각각 별도로 추적하므로, indel이 있는 시퀀스에서 훨씬 더 나은 정렬 결과를 제공합니다. 기존 `nw_align` 함수는 변경하지 않았습니다.\\n\\n모든 것이 제대로 동작하는지 확인할 수 있도록 간단한 테스트도 만들어 드릴까요?\",\"337fc3727734dcf0\":\"게시물 더 보기\",\"33a6e1d039c22e4b\":\"중지하려면 Ctrl+C를 누르세요\",\"34911158c72918f7\":\"5초간 생각함\",\"34b7075af03dd20b\":\"문의하기\",\"34f8d19c66148401\":\"테스트 작성 중\",\"3528ed0ea406d645\":\"기업\",\"359ce1060d921922\":\"조직 전체에 적용\",\"35a99547283be9aa\":\"Linear에서 이슈를 분류하고 업데이트하세요.\",\"35b85c2be3392d46\":\"자동화 덕분에 업무에서 반복적인 부분을 쉽게 맡길 수 있게 되었습니다. 작업을 모으고, 문서 업데이트를 처리하고, Slack 메시지에 응답하는 자동화를 만들어 두면 정말 중요한 일에 집중할 수 있습니다.\",\"360e1dc944cbc91e\":\"이벤트 둘러보기\",\"36485e1e5ea09775\":\"이슈에 기능이나 누락된 테스트 커버리지를 설명하면 Cursor가 이를 구현한 다음 검토를 위해 PR을 엽니다.\",\"366451888f3910ae\":\"버그 리포트를 수정으로 이어지게 하세요. Cursor는 티켓에 이미 있는 설명, 댓글, 컨텍스트를 바탕으로 작업합니다.\",\"3666b0d9244feaa5\":\"builder.rs +89 -12\",\"36e9a1fb790d7d6e\":\"이전 단계로 돌아가기\",\"36ec0ea9129f1b20\":\"@Dropdown.tsx를 🌐 stripe.com/checkout처럼 보이게 만들기\",\"36ffad4f631c30cf\":\"Privacy Mode 기본 활성화, SSO/SAML, RBAC\",\"37158848c91182b9\":\"프로덕션 환경에 바로 사용할 수 있는 클라우드 인프라를 활용하세요\",\"372ab972d4e067da\":\"어떤 환경에서든 더 많은 에이전트를 병렬로 실행하고 관리하세요.\",\"3742e80a55d7ea97\":\"가장 강력한 코딩 모델입니다. 장시간 실행되는 에이전트 기반 작업을 위해 설계되었으며, 다른 프런티어 모델보다 훨씬 낮은 비용으로 제공됩니다.\",\"37479b5348d1cdcd\":\"types/user.ts를 읽었습니다\",\"374a1ddaa78d8cf7\":\"신용카드 필요 없음\",\"37a318097d13899e\":\"접근 권한을 관리하고, 개인정보 보호를 강제하며, 사용량을 추적하세요.\",\"37e540c0a3c4d41a\":{\"c\":\"패딩:\",\"i\":1,\"t\":\"label\"},\"381475c4965207a6\":\"잘 잡아냈네요, 머지할게요!\",\"3830d250935346a2\":\"현재 활성\",\"38410da8fdac6584\":\"Cursor는 에디터와 CLI에서 많은 에이전트를 병렬로 실행할 수 있는 뛰어난 클라우드 환경을 제공합니다. 저희는 VM을 관리하거나 메모리 제한을 우회할 필요 없이 동일한 클라우드 런타임에서 자체 프로그래밍 방식 에이전트를 실행해, 개발자의 지속적인 개입 없이 코드베이스를 안정적으로 유지할 수 있는 방법으로 SDK를 기대하고 있습니다.\",\"38ce9b4cc26534d9\":\"에이전트 기반 개발 살펴보기\",\"38e673865704fb36\":\"함께 배포하는 팀을 위해\",\"38fbca7a03b30cd0\":\"플러그인, 스킬, 규칙, 훅을 위한 팀 마켓플레이스로 최고의 엔지니어 워크플로우를 중앙에서 관리하세요.\",\"3902e316be3f33d5\":\"팀 관리자 및 청구\",\"390c7241e5ad4918\":\"Teams에는 어떤 사용량이 포함되나요?\",\"392e65b8c8164c73\":[\"Campus Lead는 검증된 접근 방식을 가르치고, 이벤트를 주최하며, 학생 커뮤니티를 성장시키는 방식으로 학교에서 Cursor를 대표합니다. 모집 인원은 제한되어 있습니다. \",{\"c\":\"Campus Lead 페이지에서 자세히 알아보고 지원하세요\",\"i\":1,\"t\":\"a\"},\".\"],\"39677365ef5dde5d\":\"팀에 문의하기\",\"397e527cc3aa17be\":\"'gotoh algorithm implementation python'을 검색했습니다\",\"39bb80937ee72e70\":\"GitHub, Slack, Linear, JetBrains IDEs 등에서 에이전트를 시작해 보세요.\",\"39c38a7c8eb42898\":\"문의 폼 - 이메일 단계\",\"39cf02c79e7cfd45\":\"다음 단계 계획 중\",\"3a2ec0cb4f73d820\":\"소규모 팀이신가요? 여기서 시작하세요:\",\"3a38d8a4f875951a\":\"에이전트\",\"3a78a1a39fbe45f8\":\"UserProfile.tsx를 grep했습니다\",\"3ab928741d208f41\":\"불러오는 중...\",\"3ac800cada315164\":\"디스패처를 검증하기 위해 tokio를 사용한 async 테스트도 만들겠습니다:\",\"3b05ed056a1db7ac\":\"1.0 changelog를 볼 수 있게 cursor.com/changelog#1.0으로 바로 갈 수 있으면 좋겠어요\",\"3b28878accf137fb\":\"기업\",\"3b2ba331943e031b\":\"Cursor는 팀이 야심 찬 제품을 배포할 수 있도록 돕습니다.\",\"3b5027192f9a223a\":\"데스크톱\",\"3b59df5f14e962d7\":\"팀 사용 행태를 파악하기 위한 사용량 분석\",\"3b654811c92e5146\":\"영업팀과의 미팅을 예약해 주셔서 감사합니다.\",\"3b6eed562a1a63a2\":\"프로젝트 빌드 및 테스트\",\"3bbf014885dd2a5f\":\"작업을 설명하세요...\",\"3bfe28aeb15e4890\":\"기본적으로 꺼짐\",\"3c185b31f0be16ff\":\"버그를 설명하세요...\",\"3c426320fae94089\":\"문서를 자동으로 업데이트하고, 보안 검토를 실행하거나, 맞춤형 코딩 에이전트를 만드세요.\",\"3c68a5ff6b5eb984\":\"예정된 모든 워크숍 보기.\",\"3d0c87d1057cfe13\":\"기업\",\"3d26c791d3bcb69a\":\"보안\",\"3d436cb9d7699759\":\"모든 도구에서, 모든 단계에 걸쳐\",\"3d7777433929e536\":\"각 엔지니어가 혼자서 Cursor를 익혀야 합니다\",\"3db36f8fcd2f6f14\":\"팀 관례부터 구체적인 아키텍처 결정까지, 선호 사항을 Cursor에 알려주세요.\",\"3db62ff1b89fc1bc\":\"app/api/health/route.ts +12 -3\",\"3dbc1becd9b80bbe\":\"app/layout.tsx, styles/theme.css 읽기\",\"3de4be9ec364e438\":\"middleware.ts +28 -4\",\"3e1fded18cc21f76\":\"코딩 에이전트 CLI\",\"3e3c2283205574d4\":\"Blog 업데이트와 독점 콘텐츠를 받아보려면 뉴스레터를 구독하세요\",\"3e74a7c1fef80184\":\"조직 전체에서 Privacy Mode를 활성화하면 고객님의 코드는 학습에 절대 사용되지 않습니다. 또한 Cursor는 모든 모델 제공업체와 데이터 미보존 계약을 체결하고 있습니다.\",\"3ea28cba51c2c414\":\"CursorBench 3.1에는 더 큰 규모의 수정과 더 복잡한 리포지토리를 포함해 이전 버전보다 더 어려운 과제가 포함됩니다. 점수는 동일한 eval 버전 내에서 비교해야 합니다.\",\"3eb2c31479c86a92\":\"클라우드 Agent\",\"3f30d07bc3811512\":\"학생\",\"3f500d31523707a9\":\"bio/sequence_alignment.py, bio/fasta.py, bio/translate.py 읽기\",\"3fae9fe69734245c\":\"완벽합니다! 다음이 포함된 작동하는 이커머스 대시보드를 만들었습니다:\\n\\n• **Navigation**: 이모지 아이콘이 있는 Analytics 및 Orders 섹션\\n• **Content**: 로딩 상태를 포함한 동적 매출 계산과 주문 수\\n• **Support Chat**: react-query로 메시지를 가져오는 고객 지원 채팅\\n\\n이 대시보드는 react-query를 사용해 메시지 데이터를 가져오고 로딩 상태를 표시합니다. 고객 지원은 메시지 API와 연동됩니다. `Cmd+K`를 눌러 채팅 입력창에 포커스를 맞춰 보세요!\",\"40a0d8540799f744\":\"에이전트와 함께 코드를 배포하세요\",\"40a854a7cad65ec4\":{\"c\":\"상호작용 비활성화\",\"i\":1,\"t\":\"span\"},\"411405b7b6c33ba0\":\"**버그: 전역 Blob 저장소로 인해 데이터가 유출됨**\\n`blobStore`가 모듈 전역 상수로 선언되어 있어 모든 `AgentConnectClient` 인스턴스에서 공유됩니다. 이로 인해 한 클라이언트 세션이나 대화의 메모리 내 blob 데이터에 다른 인스턴스가 접근할 수 있어 데이터가 유출됩니다.\",\"41e3e2428daf504a\":\"데모 시작하기\",\"41e84700c9fa5bc5\":\"Cursor 또는 LLM 제공업체는 고객 데이터를 학습에 사용하지 않습니다. 모든 팀 구성원에게 적용됩니다.\",\"41fdb51faa6c1ae8\":\"팀 규칙\",\"42eb8ae47cb3418e\":\"높은 정확도, 낮은 노이즈\",\"430c9e86017cb261\":\"대시보드가 느려요. 첫 로드에 4초 이상 걸려요. @cursor 이거 살펴볼 수 있어?\",\"43246719d5488314\":\"마지막 답글 {time}\",\"432cce3758bc3df5\":\"MCP, 스킬 및 훅\",\"43494087956350bc\":\"Cursor를 사용하는 Fortune 500대 기업.\",\"4354d29e9ae72d6d\":{\"c\":\"모두 유지\",\"i\":1,\"t\":\"button\"},\"437cb4b5ea2420b8\":\"도움말\",\"43810731508e486e\":\"설치 가이드, 에이전트, MCP 통합.\",\"441e9441a875f8d5\":\"3초간 생각함\",\"444af2af70cd47be\":\"더 나은 소프트웨어를 더 빠르게 배포하세요\",\"4491c204f453f78f\":\"생각 중 4초\",\"44a823d8decbafc5\":\"블로그 읽기\",\"4514be6be3aa4e63\":\"모든 게시물\",\"451bb96ccd44f765\":\"보도자료\",\"451d9f26a9388711\":\"이제 결과를 저장하고 자세한 보고서를 생성하도록 평가 모듈을 업데이트하겠습니다:\",\"45261ef25191b8d4\":\"Cursor는 SOC 2 Type II 인증을 받았으며, 정기적으로 침투 테스트를 수행합니다. 관련 보고서는 Trust Center에서 확인할 수 있습니다.\",\"4540c89dcfdd1a6b\":\"기업용 제어 기능 보기\",\"461b75f1c29980bf\":\"학습을 확장하고 새로운 학습 방식을 추가한 방법\",\"46222ccaa687f033\":\"Composer 기술 보고서\",\"466aad857f096515\":\"네! Bugbot Rules를 사용하면 맞춤형 코딩 기준을 정의하고, 검증된 방식을 적용하며, 팀의 요구에 맞는 프로젝트별 가이드라인을 설정할 수 있습니다.\",\"4687f080dee674c0\":\"설정 가능한 제한과 적절한 Redis 정리를 갖춘 레이트 리미터를 생성합니다:\",\"468d9fc08136a918\":\"모든 것이 제대로 동작하는지 확인하기 위해 프로젝트를 빌드하고 테스트 스위트를 실행하겠습니다.\",\"46a0a85ad688a5d7\":\"변경된 파일 1개\",\"46c6844907247969\":\"차세대 빌더들이 더 큰 가능성을 펼칠 수 있도록 지원합니다. 지금 무료로 시작하세요.\",\"470a3d8e6f4a9c3b\":\"문제가 발생했습니다. 다시 시도해 주세요.\",\"47561f49ac547e71\":\"개별 좌석\",\"47cb439e4dd834a9\":\"최신 기능을 확인하기 위해 Next.js 문서 사이트로 이동하겠습니다.\",\"47d11082edb8d87d\":\"혼합 정밀도, 검증 분할, 그리고 적절한 설정 관리를 포함한 완전한 실험 프레임워크로 MNIST 학습기를 개선하겠습니다. 먼저 학습 모듈부터 다시 작성하겠습니다:\",\"47f3316fcd69d727\":\"조직 전체 Privacy Mode\",\"4837cbcd7b106817\":\"소통하는 곳에서 바로 코딩하세요.\",\"483ba61595062161\":\"SCIM 접근 제한 없음\",\"488e820d7de6c6c2\":\"아이디어를 코드로 구현하세요\",\"48de21dffb27aea4\":\"Changelog\",\"49071a7305c69c8d\":\"Bugbot은 코드를 리뷰할 때 프런티어 모델과 자체 개발 모델을 조합해 사용합니다. 저희가 찾아낸 버그의 절반 이상은 최종적으로 엔지니어가 수정합니다.\",\"492a27907d62a25b\":\"Jira에서 Cursor 에이전트는 어떻게 시작하나요?\",\"496e0c67f1cb0270\":\"Agent는 실행 중에도 메시지에 반응하며, 이후 GitHub에서 PR을 열거나 Cursor 데스크톱으로 바로 이동할 수 있는 링크를 보내줍니다.\",\"496fc34ce5dffbcd\":\"우선 지원 및 계정 관리\",\"497182659c04380b\":\"src/components/Checkout.tsx +5 -1\",\"4986fa1f8d806e36\":\"생성 중\",\"49ab64b61f10d412\":\"{count, plural, one { {count}개 token} other { {count}개 tokens}}\",\"49d8b34279f9d073\":\"사용량 기반 요금제는 어떻게 작동하나요?\",\"49f4929f15bd89f5\":\"Cursor는 온프레미스 또는 VPC 배포를 지원하나요?\",\"49f7cbd0032b21ef\":\"stripe-billing\",\"4a124bd2d45f8547\":\"분석 대시보드\",\"4a1f6dfd52b9de37\":\"{site}에서 읽기\",\"4b0fef7aa7f6705a\":\"Jira 이슈를 pull request로 전환하세요.\",\"4b253a5ff9aeed07\":\"지원\",\"4b2b5fc187b8301b\":\"데모 예약하기\",\"4b8e42708611e847\":\"app/checkout/actions.ts 읽기\",\"4b923c21d674c2f3\":\"에이전트 생성\",\"4b9e16a0cb4dc79b\":\"저장 데이터는 AES-256으로 암호화하고, 전송 데이터에는 TLS 1.2+를 적용합니다.\",\"4c035703e473ef3e\":\"자동화된 CI/CD 워크플로우를 위해 Cursor CLI를 GitHub Actions와 통합하세요.\",\"4c05db15de29fc10\":\"기능 및 테스트 추가\",\"4c08f7ce2a952eef\":\"개별\",\"4c5b185110955a4e\":\"채널 설정\",\"4cb65658b72ac4df\":\"이제 메시지를 가져오기 위해 react-query를 사용하는 SupportChat 컴포넌트를 구현하겠습니다:\",\"4cb8669cfe472dbe\":\"Bugbot은 기존 워크플로우에 어떻게 통합되나요?\",\"4cd3a0ae6907eec5\":\"리뷰\",\"4ce24d68613cb3e3\":\"원래라면 프로토타이핑하는 데 몇 주가 걸렸을 기능이 하루 만에 만들어지는 것을 봐 왔습니다. 익숙하지 않은 코드베이스에 팀이 빠르게 적응하고, 의미 있는 코드를 생성하고, 복잡한 이슈를 더 빠르고 자신 있게 디버그하는 데 도움이 됩니다.\",\"4d08bbf5a178e689\":{\"c\":\"요청에 대한 추가 정보를 입력하는 필드입니다.\",\"i\":1,\"t\":\"div\"},\"4d15e9065c692d83\":\"그라인드\",\"4d2f014f6112c6f9\":\"스토리 읽기\",\"4d3509b32eee31f1\":\"참고가 필요한 항목은 @멘션과 이미지 업로드를 사용해 Cursor에 정확히 지정하세요.\",\"4d3dfbf2bd4644f4\":\"아이디어\",\"4d5c13bd91dc2e1f\":\"최신 Next.js 문서를 찾아내고 새 기능을 요약해 주세요\",\"4d620d61d1f7717f\":\"의사결정에 집중하는 동안 작업은 Cursor에 맡기고 개발 속도를 높이세요.\",\"4dc13799becbf624\":{\"c\":\"저희 팀이 문의 내용을 검토한 후 곧 연락드리겠습니다. 그동안 Cursor를 시작해 보거나 문서를 살펴보세요.\",\"i\":1,\"t\":\"h2\"},\"4e0e1c7cdac3034c\":\"키워드를 리포지토리 또는 멀티 리포 환경에 매핑해, 에이전트가 매번 올바른 컨텍스트로 시작되도록 하세요.\",\"4e3707f8e33ade5c\":\"페이지로 이동하는 중...\",\"4e4f83ebaf244146\":\"Linear 및 Jira\",\"4ebad3a0708124a9\":\"스킬\",\"4eca9b0ad3d040f7\":\"클라우드 Agent 살펴보기 →\",\"4ef289ab8bca72e7\":\"Cursor 시작하기\",\"4ef7c5bf10d357a9\":\"탁월한 생산성을 위해 설계된 Cursor는 최고의 AI 코딩 에이전트입니다.\",\"4f0cd1da4acc7c04\":\"CLI 시작하기\",\"4f218b52d4004d8d\":\"Composer 2.5\",\"4f2c4889fb71b435\":\"패널이 준비되었습니다. 그리드 레이아웃으로 구성하는 중입니다:\",\"4fb3cffa8ff22d4c\":\"네! 모든 플랜에 대해 14일 무료 평가판을 제공합니다. 커밋하기 전에 모든 기능을 테스트하고 Bugbot이 여러분의 코드베이스에서 어떻게 동작하는지 확인할 수 있습니다.\",\"4fc7dc81031ae587\":\"Ultra 시작하기\",\"4fe3cde32c00b2ae\":\"6초간 생각함\",\"4fefee28f94fe3d9\":\"팀에 Cursor를 도입하세요\",\"5004547dc22a40db\":\"다운로드\",\"501fa7ed3aadd5f3\":\"Cursor에게 무엇이든 만들고, 계획하고, 수정하게 하세요\",\"5045cc4acd4dc489\":\"2025년 2월까지 Coinbase의 모든 엔지니어가 Cursor를 사용해 보았고, 이제 Cursor는 대다수 개발자가 선호하는 IDE가 되었습니다. 이제 개별 엔지니어들이 코드베이스 리팩터링, 업그레이드, 또는 새로운 코드베이스 구축을 몇 달이 아니라 며칠 만에 해내고 있습니다.\",\"5079eaf989b92263\":\"클라우드 Agent는 노트북을 닫아도 계속 작업하며, 자신의 작업을 테스트하고 검증하고 확인할 수 있습니다.\",\"50870e64c8658fe7\":\"localhost:3000/cart 스크린샷\",\"50a4896e739c4354\":{\"c\":\"그동안 Cursor를 시작해 보거나 문서를 살펴보세요.\",\"i\":1,\"t\":\"p\"},\"50b6ab96f52f8ffb\":\"Cursor Automations와 SDK를 사용하면 팀의 코드베이스를 유지·개선하는 에이전트를 만들 수 있습니다.\",\"50c4e61365b40d6b\":\"Cursor의 새로운 소식 — 최신 업데이트 및 릴리스 노트\",\"50d06b325fd5cddd\":\"브라우저나 휴대폰에서 이동 중에도 클라우드 Agent를 실행하세요.\",\"51220106f3b4bff5\":\"워크숍 시청하기\",\"5147d5a7674d0294\":\"Cursor는 코드에 계측을 추가하고 실제 실행 데이터를 활용해 수정이 필요한 지점을 정확히 찾아냅니다.\",\"515ff9ed076dfc5c\":\"팀을 위한 자율형 에이전트\",\"51704beb565c12fe\":\"지속 가능한 소프트웨어 개발\",\"51ea95b7b3e48659\":\"패널 작업이 진행되는 동안 공유 인프라를 설정하겠습니다. 먼저 실시간 업데이트를 위한 훅입니다:\",\"51fbac7dd554cab8\":\"기술에 밝은 학생 창업가인 제게 Cursor는 삶을 바꿔 놓았습니다. 고수준 아키텍처를 구상하고, 프런트엔드 스타일링을 하고, 제가 만든 맞춤형 백엔드와 완전히 통합하고, 모든 단계에서 버그를 수정하면서 스타트업 아이디어를 며칠 만에 현실로 바꿀 수 있게 도와줍니다.\",\"5224e9d894806eb0\":{\"c\":[{\"c\":\"IDE 레이아웃\",\"i\":2,\"t\":\"option\"},{\"c\":\"Agent 레이아웃\",\"i\":3,\"t\":\"option\"}],\"i\":1,\"t\":\"select\"},\"5227e76253758cf2\":{\"c\":\"데모 모드\",\"i\":1,\"t\":\"span\"},\"525e944cd1b60591\":[\"아니요. Cursor 구독은 \",{\"c\":\"cursor.com\",\"i\":1,\"t\":\"a\"},\"을 통해서만 직접 판매됩니다. 당사는 어떠한 리셀러나 타사 판매자도 승인하지 않습니다. 다른 출처에서 구매한 구독은 공식적으로 인정되지 않으며, 사기이거나 보안상 안전하지 않거나 당사 시스템 악용을 통해 취득되었을 수 있습니다. 이러한 계정은 언제든지 정지되거나 해지될 수 있습니다. 접근 권한과 보안을 보호하려면 반드시 공식 웹사이트를 통해서만 Cursor를 구매하세요.\"],\"52dd301200516c77\":\"Cursor는 파일을 수정하고, 터미널 명령을 실행하고, Web을 검색하는 등 다양한 작업을 수행합니다.\",\"533d94ade1f18e6e\":\"체크아웃 버튼이 동작하지 않습니다. 클릭해도 아무 반응이 없습니다. 무엇이 문제인지 확인해 주실 수 있나요?\",\"5364b362031795ca\":\"Cursor는 모든 엔지니어가(저를 포함해) 복잡한 문제를 풀거나 막혔을 때 본능적으로 찾게 되는 도구입니다. 엔지니어링 팀 전체에서 100% 도입된 Cursor는 이제 우리가 제품을 만드는 방식에서 없어서는 안 될 부분이 되었습니다.\",\"53b579e86cfd8a96\":\"더 높은 수준의 방향성에 집중할 수 있도록 구현은 위임하세요.\",\"53b91122838bce63\":\"참여하기\",\"53be298d2539927b\":\"서버 액션과 함께 App Router를 사용 중입니다.\",\"53d4773d31f86e6a\":\"Cursor는 SSO와 SCIM을 지원하나요?\",\"53d947000278d0ae\":\"버전 {versionText}\",\"5439c4a5b640f097\":{\"c\":[{\"c\":\"데모 기능\",\"i\":2,\"t\":\"h2\"},{\"c\":[{\"c\":[\"• \",{\"c\":\"유연한 구성:\",\"i\":5,\"t\":\"strong\"},\" 모바일 데모, 데스크톱 창, 사용자 지정 콘텐츠를 조합\"],\"i\":4,\"t\":\"li\"},{\"c\":[\"• \",{\"c\":\"다양한 레이아웃 프리셋:\",\"i\":7,\"t\":\"strong\"},\" 서로 다른 사용 사례에 맞는 사전 설정 배치\"],\"i\":6,\"t\":\"li\"},{\"c\":[\"• \",{\"c\":\"인터랙티브 창:\",\"i\":9,\"t\":\"strong\"},\" 드래그, 크기 조절, 포커스 관리(활성화된 경우)\"],\"i\":8,\"t\":\"li\"},{\"c\":[\"• \",{\"c\":\"프레임 없는 모바일 기기:\",\"i\":11,\"t\":\"strong\"},\" 창 장식 없이 깔끔하게 기기를 표시\"],\"i\":10,\"t\":\"li\"},{\"c\":[\"• \",{\"c\":\"사용자 지정 콘텐츠 창:\",\"i\":13,\"t\":\"strong\"},\" 선택적 CTA와 함께 모든 React 구성 요소 포함\"],\"i\":12,\"t\":\"li\"},{\"c\":[\"• \",{\"c\":\"반응형 동작:\",\"i\":15,\"t\":\"strong\"},\" 다양한 화면 크기에 맞춰 레이아웃 자동 조정\"],\"i\":14,\"t\":\"li\"},{\"c\":[\"• \",{\"c\":\"애니메이션 지원:\",\"i\":17,\"t\":\"strong\"},\" 순차적인 등장 애니메이션과 부드러운 상호작용\"],\"i\":16,\"t\":\"li\"}],\"i\":3,\"t\":\"ul\"},{\"c\":\"레이아웃 프리셋\",\"i\":18,\"t\":\"h3\"},{\"c\":[{\"c\":[{\"c\":\"Slack + Mobile\",\"i\":21,\"t\":\"h4\"},{\"c\":\"모바일 데모와 함께 Slack 통합을 보여주며, 크로스 플랫폼 기능을 시연하기에 적합합니다.\",\"i\":22,\"t\":\"p\"}],\"i\":20,\"t\":\"div\"},{\"c\":[{\"c\":\"듀얼 모바일\",\"i\":24,\"t\":\"h4\"},{\"c\":\"서로 다른 설정이나 플랫폼을 보여주는 모바일 기기를 나란히 배치합니다.\",\"i\":25,\"t\":\"p\"}],\"i\":23,\"t\":\"div\"},{\"c\":[{\"c\":\"트리플 뷰\",\"i\":27,\"t\":\"h4\"},{\"c\":\"여러 통합과 모바일 기기를 포함한 복합 레이아웃으로, 포괄적인 데모에 적합합니다.\",\"i\":28,\"t\":\"p\"}],\"i\":26,\"t\":\"div\"}],\"i\":19,\"t\":\"div\"},{\"c\":\"기술 구현\",\"i\":29,\"t\":\"h3\"},{\"c\":\"DemoMultiWindow는 DemoDesktop을 기반으로 구현되었으며, 여러 데모 구성 요소를 조합할 수 있도록 타입 안전성과 유연성을 갖춘 API를 제공합니다. 세 가지 항목 유형을 지원합니다:\",\"i\":30,\"t\":\"p\"},{\"c\":[{\"c\":[\"• \",{\"c\":\"asWindowContent=true\",\"i\":33,\"t\":\"code\"},\" - \",{\"c\":\"asWindowContent=true\",\"i\":33,\"t\":\"code\"},\"로 DemoMobile을 렌더링\"],\"i\":32,\"t\":\"li\"},{\"c\":[\"• \",{\"c\":\"type: \\\"desktop\\\"\",\"i\":35,\"t\":\"code\"},\" - 중첩된 DemoDesktop 구성 요소를 렌더링\"],\"i\":34,\"t\":\"li\"},{\"c\":[\"• \",{\"c\":\"type: \\\"custom\\\"\",\"i\":37,\"t\":\"code\"},\" - 선택적 창 장식과 함께 모든 사용자 지정 React 콘텐츠를 렌더링\"],\"i\":36,\"t\":\"li\"}],\"i\":31,\"t\":\"ul\"},{\"c\":\"각 항목은 위치, 크기, 설정을 독립적으로 지정할 수 있어, 하나의 화면에서 Cursor 기능의 여러 측면을 보여주는 복잡한 데모 레이아웃도 쉽게 만들 수 있습니다.\",\"i\":38,\"t\":\"p\"}],\"i\":1,\"t\":\"div\"},\"546a5aaa4b6a6315\":\"lib/redis.ts 읽기\",\"54a1ba52b6d0c1c0\":\"문제를 찾았습니다! 버그는 `applyBugbotPRReview.ts`의 PR 댓글 가져오기 로직에 있습니다.\",\"54c234f7ca2e3355\":{\"c\":[{\"c\":[{\"i\":3,\"t\":\"input\"},{\"c\":\"자동 재생\",\"i\":4,\"t\":\"span\"}],\"i\":2,\"t\":\"label\"},{\"c\":[{\"i\":6,\"t\":\"input\"},{\"c\":\"ms\",\"i\":7,\"t\":\"span\"}],\"i\":5,\"t\":\"label\"},{\"c\":[{\"i\":9,\"t\":\"input\"},{\"c\":\"에이전트\",\"i\":10,\"t\":\"span\"}],\"i\":8,\"t\":\"label\"},{\"c\":[{\"i\":12,\"t\":\"input\"},{\"c\":\"사이드바\",\"i\":13,\"t\":\"span\"}],\"i\":11,\"t\":\"label\"},{\"c\":[{\"i\":15,\"t\":\"input\"},{\"c\":\"에디터\",\"i\":16,\"t\":\"span\"}],\"i\":14,\"t\":\"label\"},{\"c\":[{\"i\":18,\"t\":\"input\"},{\"c\":\"채팅\",\"i\":19,\"t\":\"span\"}],\"i\":17,\"t\":\"label\"},{\"c\":[{\"i\":21,\"t\":\"input\"},{\"c\":\"레이아웃 뒤집기\",\"i\":22,\"t\":\"span\"}],\"i\":20,\"t\":\"label\"}],\"i\":1,\"t\":\"div\"},\"54f240bfd8ca9a71\":\"기술 지원\",\"552446d2cc5de877\":\"레이트 리미팅 추가\",\"55347fc1691fb431\":\"내 시퀀스 정렬 도구에 affine gap alignment를 추가하세요\",\"555504c7bb44897c\":\"누군가 팀에 참여하면 기존 개별 구독은 자동으로 취소됩니다. 사용하지 않은 구독 기간은 남은 기간에 비례해 환불됩니다.\",\"558f07f5acdcb178\":\"원래라면 프로토타이핑하는 데 몇 주가 걸렸을 기능이 하루 만에 만들어지는 경우도 확인했습니다. 덕분에 팀은 익숙하지 않은 코드베이스에도 더 빠르게 적응하고, 의미 있는 코드를 생성하며, 복잡한 문제도 더 빠르고 자신 있게 디버그할 수 있습니다.\",\"5595f09d69a30513\":\"ContextMenu.tsx 읽음\",\"559bc560878cd6b5\":\"워크숍\",\"55c3e2bba5118549\":\"팀이 일하는 모든 곳\",\"560e21a44751d219\":\"Cafe Cursor를 여러분의 도시에 초대하려면 어떻게 해야 하나요?\",\"561b4c7518978d47\":\"SOC 2 Type 2 인증과 연례 침투 테스트.\",\"5642e768cb29b996\":\"Sasha Rush가 Composer의 배경 연구를 설명하는 영상 보기(13분, X에서 열림)\",\"5686f8bd6143bea9\":\"Jira 워크스페이스에서 Cursor를 사용해 보세요.\",\"56a57898a47124e6\":\"구매하기 전에 Bugbot을 사용해 볼 수 있나요?\",\"56d98fe9bd08751c\":\"미팅 예약 완료\",\"56da7b94d807ba6a\":\"Cursor 시작하기\",\"56db4d333852aadd\":\"app/api/chat/route.ts +42 -18\",\"56deb8c79c0c8b99\":\"버그를 찾았습니다. 수정할까요?\",\"57247042c5c625e9\":\"공유 규칙, 스킬, 워크플로우로 팀의 역량을 높이세요.\",\"57823993c63da8bd\":\"Slack용 Cursor 시작하기\",\"5792ba1e30a05ad3\":[{\"c\":\"배율:\",\"i\":1,\"t\":\"label\"},{\"i\":2,\"t\":\"Select\"}],\"57ad296814efc2c6\":\"첫 번째 에이전트 만들기\",\"57d5a88e2591967a\":{\"c\":[{\"i\":2,\"t\":\"input\"},{\"c\":\"상호작용 비활성화\",\"i\":3,\"t\":\"span\"}],\"i\":1,\"t\":\"label\"},\"57f7ea0d5df3d6af\":\"처럼 보이도록\",\"57fc7295bbf941cb\":\"완료! 이제 `/dashboard`에서 health, 배포, 인시던트를 한 화면에서 확인할 수 있습니다. 각 패널은 SSE를 통해 자동으로 업데이트됩니다.\",\"582c0e77ee078fe0\":\"모델 접근 제한\",\"5834b6317e825251\":\"채널 설정\",\"585a5bdf759861f4\":[\"Privacy Mode는 설정에서 켜거나 팀 관리자가 켤 수 있습니다. 이 기능이 켜지면 당사와 모델 제공업체가 코드 데이터를 학습에 사용하지 않도록 보장합니다. 자세한 내용은 \",{\"c\":{\"i\":2,\"k\":\"_gt_value_2\",\"v\":\"v\"},\"i\":1,\"t\":\"a\"},\" 페이지에서 확인할 수 있습니다.\"],\"589eae8e23ae0a93\":\"인증 버그를 언제 수정했나요?\",\"58af479f6ebe4540\":\"항상 켜져 있는 에이전트로 시간을 절약하세요\",\"58ca6c02f1be14d8\":\"코드로 제어하는 에이전트 만들기\",\"58d8223cc47e7b06\":\"Tab\",\"58de1535915fe2de\":\"지금 Tab을 사용해 보세요.\",\"58fd5c68a088796a\":\"경쟁 상태를 찾아냈습니다. 동시에 두 건의 구매가 발생하면 어느 쪽도 재고를 차감하기 전에 둘 다 재고 확인을 통과할 수 있습니다. 이것이 버그의 원인일 가능성이 높습니다. 수정하고 테스트를 추가하겠습니다:\",\"590c7c3444726976\":\"Premium 지원\",\"591a0510c8e84a5a\":\"개별 좌석보다 Teams가 더 나은 이유는 무엇인가요?\",\"59263684ffcfebeb\":\"리뷰 준비 완료\",\"5929b8a359c1d45e\":\"Cursor 또는 LLM 제공업체는 사용자의 데이터를 학습에 사용하지 않습니다.\",\"59be625b4381dadb\":\"Cursor는 어떤 보안 인증을 보유하고 있나요?\",\"5a2177748764b857\":\"Mission Control 계획\",\"5a31376bd6bd8b20\":\"사용 가능한 모델 보기\",\"5aca37ac0570da8b\":\"원격 데스크톱 제어\",\"5ae799701994cc08\":\"미래\",\"5aec9fe3970b5540\":\"메뉴 펼치기\",\"5b40681410b7b70d\":\"Dwarkesh Flashcards\",\"5c51ebc639a5b935\":\"모든 PR에 적용되는 팀의 품질 기준\",\"5c601c64f2265a9c\":\"PR 위험 평가 → 검토자 지정\",\"5c78a8ae7b71af1d\":\"터미널\",\"5c86f7896183300b\":{\"c\":\"데모 레이아웃\",\"i\":1,\"t\":\"span\"},\"5d271f902333345f\":\"독립적으로 동작\",\"5db6ccfea6848fc3\":\"Cursor CLI — 터미널, GitHub Actions, 자동화 및 스크립트에서 에이전트를 실행하세요\",\"5e0f121994a0f158\":\"작년에 제가 직접 쓴 코드를 두고 계속 봇처럼 잘난 척하며 설명해대길래 Cursor랑 10분 동안 실랑이했습니다. 알고 보니 Cursor가 맞았고 제가 잘못 기억하고 있었더라고요. 차 한 모금 마시고 좀 진정하러 가야겠습니다.\",\"5e20918433c77a83\":\"Cursor Blame\",\"5e26bd9b3023376d\":\"취미용의 모든 기능에 추가로:\",\"5e8411721bc1ed59\":\"단순한 공개 benchmark 이슈만이 아닙니다\",\"5e92aea16a239c0f\":\"Pro\",\"5ea62c5c0804d267\":\"OpenAI 클라이언트는 이미 스트리밍을 지원합니다. 적절한 인코딩으로 해당 스트림을 응답에 직접 파이프하겠습니다:\",\"5edcd1e637d20e74\":\"Cursor Ambassador가 되세요\",\"5f0ac6b8c11f81ea\":\"버그 수정\",\"5f26db1b9c910040\":\"menu-styles.css에서 찾음\",\"5f27e2592946864b\":\"이전 실행에서 학습\",\"5f4e946e848fd5f0\":\"리포지토리 차단 목록\",\"5f56dc9ce71aa076\":\"Cursor는 제 스타트업을 만드는 데 핵심적인 도구가 되었고, 인원 확충 없이도 제품을 빠르게 반복 개선할 수 있게 해주었습니다. 집중력 있는 팀이라면 생산성을 5~10배까지 끌어올릴 수 있는 도구라고 해도 과언이 아닙니다.\",\"5f5e12e06f054efb\":\"Ultra\",\"5f9560370763d8c2\":\"복잡한 소프트웨어를 만드는 에이전트 중심 방식.\",\"5fdddebbeca595cb\":\"머지까지 걸리는 시간 단축\",\"601ade82daae260c\":\"Bugbot은 오탐률을 낮게 유지하면서 가장 까다로운 로직 버그를 탐지합니다.\",\"604aebf53a0b3931\":\"강력하면서도 유연하게 설정 가능\",\"60a1b8fe0560d298\":\"확장된 Agent 한도\",\"61190a98bcf09569\":\"자율적으로 동작하고 병렬로 실행됩니다\",\"613349402649dc3a\":\"src/hooks/useSSE.ts +38\",\"6149ca317ba7b036\":\"분류:\",\"616c33712c146e9a\":\"주문 관리, 애널리틱스, 고객 지원 채팅이 포함된 이커머스 대시보드 인터페이스 만들기\",\"617d43cff7d6092d\":\"조직 전체 차원의 보안 제어 없음\",\"618ebaa5d5ac0cb1\":\"연간\",\"61f31b906ecf3d59\":\"CursorBench는 에이전트 품질의 여러 측면을 평가하지만, 이 리더보드는 해결 정확성을 보여줍니다. 저희는 에이전트 기반 채점기를 사용하므로, 명세가 충분하지 않은 과제에서도 타당한 대체 구현을 인정할 수 있습니다.\",\"61f916226974b2d2\":\"Cursor가 이슈와 리포지토리 설정을 읽어 작업만 할당하면 됩니다.\",\"61fa128481d262a3\":\"후속 작업 추가...\",\"62133479b954e75b\":\"모든 테스트 통과\",\"624a7252f9a5e126\":\"Mission Control 만들기\",\"6277ecebc24bb894\":\"Cursor Pro 50% 할인 받기\",\"6280f9263cd88d6d\":[\"요건을 충족하는 해커톤에는 경우에 따라 Cursor 크레딧을 제공하기도 합니다. \",{\"c\":\"여기\",\"i\":1,\"t\":\"a\"},\"에서 요청을 제출해 주시면 몇 주 내에 연락드리겠습니다.\"],\"6291b4e80c73a7b3\":\"영업팀에 문의해 주셔서 감사합니다. 곧 연락드리겠습니다.\",\"62b386144cf35db7\":\"5초간 생각함\",\"62b6942afdad57c8\":\"{rest} 검색 중\",\"62dc4d3a19ff7ca0\":\"탭 닫기\",\"635528e4c624bf02\":\"`feature-prd.md`에 구현 단계를 초안으로 작성했습니다. 개발을 시작하기 전에 몇 가지 간단한 질문이 있습니다:\",\"636955d79a0bc853\":\"이제 핵심 지표를 결합하는 보고서 도우미로 모든 것을 하나로 묶겠습니다:\",\"63b583aaf3e44b2b\":\"Fintech Platform 규칙\",\"64204b0fe8a50884\":\"소프트웨어를 만드는 새로운 방식.\",\"644dd6127638b431\":\"탐색 닫기\",\"6486c2110656e680\":{\"c\":\"Blog\",\"i\":1,\"t\":\"Link\"},\"649218047e34e4d9\":\"Pro+ 시작하기\",\"6492da17ee3f2c2b\":\"run_experiment.py 생성됨 +29줄\",\"64be49a152b32bc7\":\"Cursor는 일정을 앞당기는 데 핵심적인 역할을 했습니다. 네 번의 스프린트가 걸리던 일을 한 번의 스프린트로 끝낼 수 있게 되었죠.\",\"64e34ec7ead4eebe\":\"라이트 테마\",\"651036b1b1880a50\":\"회사 이메일을 사용해 주세요\",\"6511b271e0dcd737\":\"공지 확인하기\",\"653f7b909b1a405e\":\"첨부된 Docs를 바탕으로 우리가 하는 일을 설명하는 랜딩 페이지를 만들어 주세요\",\"65813a1f6e1cdc0f\":\"다음 게시물\",\"65925f5108751b86\":[\"셀프 서비스 플랜은 주요 신용카드와 직불카드를 모두 지원합니다. 인보이스 청구 및 계좌이체를 원하시면, 기업 플랜에 대해 논의할 수 있도록 \",{\"c\":\"문의하기\",\"i\":1,\"t\":\"a\"},\"를 이용해 주세요.\"],\"65b1343ed8c56865\":\"Cursor는 소프트웨어 개발의 미래를 만드는 데 집중하는 응용 연구 팀입니다.\",\"65d950515c310953\":\"Cursor는 내 데이터를 어떻게 사용하나요?\",\"666902f3ed17c142\":\"어디서 작업하든 하나의 에이전트\",\"6669e11e1b22308c\":\"모델의 성능을 최대한 끌어올리는 건 역시 Cursor 팀이 최고입니다. GPT-5.2는 놀라울 정도로 성실한 모델인데, 그걸 일주일 내내 안정적으로 작동하게 만든 건 정말 대단합니다. 브라우저까지 통째로 만든 건 더 놀랍고요!\",\"6680965bdf517368\":\"/docs/app/building-your-application 페이지로 이동하는 중\",\"672601bd4119cac6\":\"Redis는 이미 세션용으로 설정되어 있습니다. 슬라이딩 윈도우 레이트 리미터를 구현하겠습니다. 고정 윈도우보다 더 정확하고, 순간적으로 트래픽이 몰릴 때도 더 잘 처리합니다.\\n\\n접근 방식:\\n• 사용자별 정렬된 집합에 요청 타임스탬프 저장\\n• 각 요청마다 윈도우보다 오래된 항목 정리\\n• 남은 항목 수를 세어 제한 확인\",\"6747d1c9977e2a91\":\"Pro+\",\"67733c48eaaec73a\":\"플랜\",\"67bf005f6c1f3ec1\":\"Blog 카테고리\",\"67cc618a82f1a3f7\":\"다른 LLM 기반 코딩 워크플로우와 달리, Cursor는 제 역량을 대체하는 것이 아니라 보완해 줍니다. 연구 프로그래밍에서 지루한 부분은 자동화하면서도, 결과를 제가 이해하고 제어할 수 있도록 적절한 수준의 “human in the loop”를 유지해 줍니다.\",\"67d3f5f955663cc4\":\"분석\",\"67f7439638ec898d\":\"커뮤니티\",\"67f896cfc89e46d2\":\"Notion 문서나 Slack 스레드를 요약하세요.\",\"67fdd25f3a50d9c6\":\"SAML/OIDC SSO\",\"681a011b5c46e2aa\":\"브라우저나 모바일에서 클라우드 에이전트를 실행하세요.\",\"684e516076de81fe\":\"Standard\",\"685a4c950d019905\":\"요소를 선택해 어떤 페이지든 시각적으로 수정하고, 즉시 다시 작성하거나 크기를 조정하거나 위치를 변경할 수 있습니다.\",\"68997fcfb77eaa96\":\"ProductCard.tsx에서 숨겨진 버튼 수정\",\"689c4d5a9520887f\":\"다음 단계 계획\",\"68a602ee5acceb85\":\"스키마\",\"68ab695fd3d18bc5\":\"해결 정확성 우선\",\"68d9afbfcea22ac0\":\"즉시 가치를 확인하세요\",\"68e3c67285692780\":\"팀 마켓플레이스\",\"69130b0b7f5bf765\":\"페이지를 찾을 수 없습니다\",\"691357f3177f0a6c\":\"로컬 에이전트의 플랜을 클라우드로 넘겨, 오프라인 상태에서도 실행되도록 하세요.\",\"6936f102acb1972f\":\"middleware.ts 읽기\",\"6940b5aec80f1b06\":\"Bugbot은 GitHub에서 직접 버그를 찾아냅니다. PR을 자동으로 검토하고, 잠재적인 문제에 댓글을 남기며, Cursor 에디터 또는 Background Agent를 통해 바로 수정 사항을 제공합니다.\",\"6942f2815416399b\":\"메시지 가져오기를 위한 react-query 패턴을 검색했습니다\",\"6989a781d5b88ddb\":\"무제한 팀 마켓플레이스\",\"6999c832625010c4\":\"Cursor에 버그를 수정하거나, 기능을 추가하거나, 테스트를 업데이트하거나, 티켓에 설명된 내용을 조사하도록 요청할 수 있습니다.\",\"69dcc85af3063c07\":\"검색 중\",\"69f558e8d4f54c2a\":\"hooks/useChat.ts +58 -14\",\"6a4b835091e7669d\":\"Cursor Agent\",\"6aa008ea818928e0\":\"야심 찬 엔지니어링 팀이 선택합니다.\",\"6ab96e26bda35288\":\"생각 중\",\"6abe47cf0d31d4ec\":\"매일 개발하는 분들을 위해\",\"6aee18605f269ea8\":\"지난주 내보내기 데이터의 대표 샘플을 사용해 동작을 고정할 테스트를 추가하겠습니다:\",\"6af8b62a57d98729\":{\"c\":[{\"i\":2,\"t\":\"AtIcon\"},{\"c\":\"컨텍스트 추가\",\"i\":3,\"t\":\"span\"}],\"i\":1,\"t\":\"button\"},\"6b1cd09f8906c320\":{\"c\":[{\"i\":2,\"t\":\"input\"},{\"c\":\"크기 조절 비활성화\",\"i\":3,\"t\":\"span\"}],\"i\":1,\"t\":\"label\"},\"6b45c1bffe5a627e\":\"복잡한 작업에서는 Cursor가 확인 질문을 하고 플랜을 세운 뒤 백그라운드에서 실행합니다.\",\"6b5df4c9a7f3dd66\":\"스킬 및 명령어\",\"6b6a9701dc74e475\":\"사용자와 그룹을 손쉽게 생성, 업데이트, 제거하세요.\",\"6c17bffb516d1ffa\":\"활성화하면 Bugbot이 새 PR에서 백그라운드로 자동 실행됩니다.\",\"6c2a55cf90318bde\":\"예정된 Cursor 이벤트는 어떻게 찾나요?\",\"6c2e1f34724f9009\":\"Cursor가 평가하는 여러 모델의 공개 CursorBench 3.1 정확도 결과를 비교해 보세요.\",\"6c398a0cef55c4a5\":\"Bugbot 시작하기\",\"6c5c72e09401b58d\":\"유효한 회사 이메일 주소를 입력해 주세요\",\"6cd9c48cb0e8210b\":\"개발의 모든 단계에서\",\"6ce0571df6302f34\":\"Discord, 포럼, Reddit는 어떻게 다른가요?\",\"6d0431d37ac24158\":\"grep하는 중\",\"6d34597e0b51de2c\":\"Mac (x64)용 버전 {versionNumber}\",\"6d74b1f1689f52fd\":\"에이전트 플랫폼 전체 이용 권한\",\"6ea79290f0f8aa44\":\"localhost:3000/cart로 이동\",\"6ebe4a3699481598\":\"탭 대비 에이전트 도입과 전환 행동을 강조하는 애널리틱스 툴킷을 만들겠습니다:\",\"6ec8a0333a52c1b8\":\"에이전트가 궁금한 분들을 위해\",\"6f1cde7615768859\":\"무엇이든 계획하고, 검색하고, 만들기...\",\"6f2deaf7b2dd0d95\":\"자동화 살펴보기\",\"6f40239bd22786e7\":\"BugBot 시작하기\",\"6f4fdb12ba78f5d4\":\"CTO로서 저는 직원들로부터 \\\"이 기술을 도입해 주셔서 감사합니다\\\"라는 문자나 Slack 메시지를 이렇게 많이 받아 본 적이 없습니다.\",\"6f7e245687e11f8c\":\"OpenAI, Anthropic, Gemini, xAI, Cursor의 모든 최첨단 모델 중에서 선택하세요.\",\"6f82b4195c3d7d3d\":\"마켓플레이스 수정\",\"6f9b579b62a6d682\":{\"c\":[{\"i\":2,\"t\":\"input\"},{\"c\":\"자동 재생\",\"i\":3,\"t\":\"span\"}],\"i\":1,\"t\":\"label\"},\"6fbe806b279996b9\":\"Cursor는 Stripe 내 수백 명의 사용자를 넘어 수천 명의 열성적인 Stripe 직원에게 빠르게 확산되었습니다. 저희는 다른 어떤 분야보다도 연구개발과 소프트웨어 개발에 더 많이 투자하고 있으며, 그 과정을 더 효율적이고 생산적으로 만들면 상당한 경제적 효과를 얻을 수 있습니다.\",\"6fd9c0d2eb6a1f1f\":\"Next.js, Postgres, 캐싱용으로 Redis 정도요. @cursor 프로젝트를 스캐폴딩해 줄 수 있나요?\",\"701964090d7b3438\":\"검색 지우기\",\"7053c5ede3a89e26\":{\"c\":\"테마\",\"i\":1,\"t\":\"option\"},\"70b48b8825e6e9d8\":\"플랜 초안을 작성하겠습니다: ThemeProvider를 마운트하고, 셸을 리팩터링하고, 테마 API를 문서화하겠습니다. 승인해 주시면 커밋하고 푸시하겠습니다.\",\"70dba5fb5c2a3777\":\"지금 Cursor를 시작해 보세요.\",\"70f3836f99ce19f3\":\"health 엔드포인트와 PagerDuty는 설정되어 있지만, 전체를 한눈에 볼 방법이 없습니다. 실시간으로 업데이트되는 패널이 있는 통합 대시보드를 만들겠습니다:\",\"71096d5462856a59\":\"모델 선택 UI가 어디에 구현되어 있는지 검색했습니다\",\"712052f01a2654c8\":\"좋습니다! 대시보드용으로 포괄적인 Cursor Rules 파일을 만들었습니다:\\n\\n**Dashboard Rules** (`.cursor/rules/next.mdc`)\\n• glob 패턴을 통해 모든 대시보드 파일에 적용됩니다\\n• Next.js App Router 권장 사항을 적용합니다\\n• 컴포넌트 구조와 네이밍 규칙을 정의합니다\\n• UI 컴포넌트, 상태 관리, 성능에 대한 지침을 포함합니다\\n\\n이 rule은 프런트매터 메타데이터를 사용해 다음을 수행합니다:\\n- **Description**: AI 어시스턴트가 검색할 수 있게 합니다\\n- **Globs**: `apps/dashboard/**/*` 파일에 자동으로 적용됩니다\\n- **@file references**: 중요한 구성 파일에 연결합니다\\n\\n이제 Cursor AI가 대시보드 코드를 작업할 때 이러한 기준을 자동으로 따릅니다!\",\"7138f388aefd2a09\":\"Cursor 블로그 RSS 피드\",\"7152ef648bf20a6a\":\"지원 및 법무\",\"71538fd96a57001d\":\"localhost:3000/checkout 스크린샷\",\"7342bfc328008926\":\"실행 중\",\"734ef43acd7655fa\":\"lib/rate-limit.ts +67\",\"735fa8731e0670ae\":\"제출\",\"73ce10939f1e86a7\":\"mission control 인터페이스 만들기\",\"740d6686b16eef09\":\"PR 보기\",\"7411b7a914433315\":\"데모 요청\",\"7457b7011adecc2a\":\"워크스페이스 전반에서 팀이 Tab 보기와 에이전트 패널에 얼마나 집중하는지 파악할 수 있도록 도와주세요.\",\"74ea0b114eed9d18\":\"Slack용 Cursor는 Privacy Mode를 지원하나요?\",\"74ea8815860f94f1\":\"작업을 시작하면 몇 분 만에 며칠치 일을 해냅니다. 게다가 원하는 만큼 여러 작업을 병렬로 수행하게 할 수도 있습니다. 이것이 모든 지식 노동 분야에서 AI 에이전트의 미래가 나아갈 방향입니다.\",\"7501101978e3cad3\":\"Cursor가 우리 개발자들이 제품 품질을 높이기 위해 도구를 활용하는 방식을 완전히 바꿔 놓았다고 할 수 있습니다.\",\"754ed87f9a933aa5\":\"개별의 모든 기능 포함, 추가로:\",\"7563c56006fe718f\":\"3패널 이커머스 대시보드 인터페이스를 만들겠습니다. 먼저 주문을 관리하고 전체 레이아웃을 조율하는 메인 Dashboard 컴포넌트부터 시작하겠습니다:\",\"75733188cc3348f6\":\"오직 Cursor를 위해 만들어졌으며, 실제 사용 시나리오의 대규모 샘플을 바탕으로 RL 학습을 거쳤습니다.\",\"7587b6c9ba9c7b77\":\"Cursor가 제 YouTube 채널이나 강의를 지원할 수 있나요?\",\"758d4e14d8f1d4d3\":\"Slack 워크스페이스에 Cursor를 도입하세요.\",\"763d007aefa19566\":\"Teams 플랜\",\"766719286ea5bbfa\":\"에이전트는 일정에 따라 실행되거나 GitHub, Slack, Linear, 웹훅 등의 이벤트로 트리거됩니다.\",\"76a91fecfd68186c\":\"macOS의 Exposé 스타일 윈도우 관리자와 유사한 Mission Control 인터페이스를 만들어 봅시다\",\"77247cbe41ea6108\":{\"c\":\"모두 되돌리기\",\"i\":1,\"t\":\"button\"},\"772f0cd0824116fb\":\"주최: \",\"779d9c0232dccbc0\":\"UI에서 모델 라벨 색상이 어떻게 지정되는지 검색했습니다\",\"77d5b06bb2fc5c6d\":\"요금제\",\"77dc9718c66b4f30\":\"조직 전반의 AI 도입 현황을 어떻게 추적할 수 있나요?\",\"782dcae905208761\":{\"c\":\"높이\",\"i\":1,\"t\":\"label\"},\"78333632f052c10d\":\"고객 사례 읽기\",\"788003d322d483de\":\"캠퍼스에 Cursor를 도입하세요.\",\"789dae69d16dc33d\":\"질문과 답변\",\"78bad7a7fdcb1449\":\"앱 다운로드\",\"78cad73ee1513261\":\"창업가로서 Cursor는 제 아이디어를 놀라운 속도로 현실로 만들 수 있게 해주었습니다. 예전에는 일주일 걸리던 일이 이제는 몇 시간밖에 걸리지 않습니다. Cursor는 제가 훨씬 더 빨리 배우도록 도와주고, 솔직히 무엇이든 만들 수 있을 것 같은 기분이 들게 합니다.\",\"78d3176ab322441c\":\"Standard의 Agent 한도 5배\",\"78fec244cccd87db\":\"@Cursor가 스레드를 읽고, 할 일을 정하고, PR을 올립니다.\",\"7905928d59208450\":\"읽기\",\"795854feef8d2f52\":\"브라우저\",\"7974447363bafbd5\":\"현대적인 엔지니어링 조직이 선택하는 도구\",\"79f06b675ac4bfad\":{\"c\":[{\"c\":\"시연된 기능\",\"i\":2,\"t\":\"h2\"},{\"c\":[{\"c\":\"• 기본 iOS 스타일 상태 표시줄이 적용된 모바일 최적화 인터페이스\",\"i\":4,\"t\":\"li\"},{\"c\":\"• 모델 선택(GPT-5.5 High)이 가능한 대화형 채팅 작성기\",\"i\":5,\"t\":\"li\"},{\"c\":\"• \\\"진행 중\\\" 및 \\\"검토 준비 완료\\\" 항목을 보여주는 실시간 에이전트 사이드바\",\"i\":6,\"t\":\"li\"},{\"c\":\"• 애니메이션 로딩 상태 및 진행률 표시기\",\"i\":7,\"t\":\"li\"},{\"c\":\"• 터치에 적합한 제어와 적절한 모바일 간격\",\"i\":8,\"t\":\"li\"},{\"c\":\"• 기존 Cursor 구성 요소(AgentsSidebar, ChatComposer)와의 통합\",\"i\":9,\"t\":\"li\"},{\"c\":\"• 반응형 크기 조정 및 기기 프레임 표현\",\"i\":10,\"t\":\"li\"}],\"i\":3,\"t\":\"ul\"},{\"c\":\"기술 구현\",\"i\":11,\"t\":\"h3\"},{\"c\":\"이 구성 요소는 DemoDesktop.tsx와 동일한 패턴으로 구현되었으며, 모바일 기기 프레임 안에서 기존 Cursor IDE 구성 요소를 활용합니다. 사실적인 모바일 UI 요소와 적절한 상태 표시줄 시뮬레이션을 포함하고 있으며, Cursor의 AI 지원이 모바일 폼 팩터에 어떻게 맞춰지는지 보여줍니다.\",\"i\":12,\"t\":\"p\"}],\"i\":1,\"t\":\"div\"},\"7a049313b1978b9b\":\"@cursor 한 번 시도해볼 수 있어?\",\"7a13661eef47cba8\":\"프런티어 모델에 대한 접근\",\"7a77b4685015f0ab\":[\"관리자는 \",{\"c\":\"관리자 대시보드\",\"i\":1,\"t\":\"a\"},\"를 통해 사용량 정보와 주요 지표를 확인할 수 있습니다.\"],\"7a8b26dda4f3ece3\":\"클라우드 Agent를 시작하려면 작업 항목을 Cursor에 할당하거나 이슈 댓글에 @Cursor를 멘션하세요.\",\"7aafea0f7a64eaed\":\"개별 좌석은 각 엔지니어가 각자 Cursor를 사용합니다. Teams는 팀 전체가 하나의 Cursor를 사용합니다.\",\"7ac52df3f6b0a072\":\"{minutes}분\",\"7b044bdd153b5c77\":\"User 타입이 어디에 정의되어 있는지 검색했습니다\",\"7b2189dac4265501\":\"Cursor는 작업 항목 제목, 설명, 댓글과 팀의 리포지토리 설정을 바탕으로 작업 범위를 정합니다.\",\"7b35307650df5523\":\"대시보드 인터페이스용 React 컴포넌트 패턴을 검색했습니다\",\"7b651f892fd43e72\":\"사용량 지출 제어\",\"7b6ccfad90fe4621\":\"최고의 엔지니어들의 업무 방식을 팀 규칙, 스킬, 워크플로우에 반영하세요. 그러면 팀의 모든 에이전트가 같은 기준을 따르게 됩니다.\",\"7bcc1d5eb19fc4e3\":[\"Teams는 셀프서비스 설정과 신용카드 결제를 원하는 최대 25명 규모의 엔지니어링 그룹에 적합합니다. 조직 전체에서 통합 사용량이 필요하거나, 인보이스 또는 PO 청구, SCIM 좌석 관리, HIPAA용 BAA, 조달 지원, 고급 보안 및 관리자 제어, 또는 전담 지원이 필요하다면 기업에 대해 상담해볼 만합니다. 플랜 비교는 \"],\"7bd88547ffae1300\":\"Cursor로 만들기 시작하세요.\",\"7bed7d3fbf638c3e\":\"계획 중\",\"7c1428be141f499a\":\"types/api.ts 읽기\",\"7c29c439735d5414\":\"중앙 집중식 팀 청구\",\"7c2d80510fcf7db3\":\"영업팀에 문의하기\",\"7c529dec44f1bfb7\":\"프리뷰 보기\",\"7c72a8f6a36b1702\":\"Cursor의 새로운 기능 확인하기\",\"7ca3a87ea715ce25\":\".\",\"7ce3b98918b0c551\":\"lib/auth.ts 읽기\",\"7ce9522cb92397e0\":\"보안과 규정 준수를 핵심에 두고 만들어졌습니다.\",\"7cedcc44c91d1879\":\"어디에서 작업하든\",\"7cf03f60ce4e9d01\":\"저희는 Cursor Blame을 사용해 작업을 수집합니다. Cursor Blame은 커밋된 코드를 이를 만들어 낸 에이전트 요청에 다시 연결해 줍니다. 이를 통해 각 eval 항목에는 실제 개발자 프롬프트와 명확한 목표 결과가 포함됩니다.\",\"7d0335baaa53251d\":\"evaluation.py +24 -6\",\"7d12ffb07d73a9ab\":\"Pro 대비 Agent 한도 20배\",\"7d8bfc5d6fed8359\":\"감사합니다! 다운로드가 곧 시작됩니다.\",\"7dbdb1264311f728\":\"누구나 Cursor를 무료로 시작할 수 있습니다. 더 많은 기능을 이용하려면 이번 가을부터 진행되는 캠퍼스 및 온라인 이벤트 프로모션을 확인해 주세요. Cursor로 무엇을 만들어낼지 기대하고 있습니다.\",\"7df262caf36b5d9c\":\"\\\"Choose a model\\\"을 grep함\",\"7e0c1a1e41ca9876\":\"모든 새 커밋을 검토하고, 테스트 커버리지를 높일 수 있도록 위험도가 높은 로직에 테스트를 추가하는 자동화를 만드세요.\",\"7e11f80cf6c79485\":\"자동화 덕분에 반복적인 업무를 손쉽게 넘길 수 있게 되었습니다. 작업을 정리하고, 문서 업데이트를 처리하고, Slack 메시지에 응답하는 자동화를 만들어 두면 정말 중요한 일에 집중할 수 있습니다. 무엇이든 자동화할 수 있습니다!\",\"7e1fe1f70fff87ef\":\"타사 보안 인증\",\"7eea7753290c7fb2\":\"요청 사항에 대해 자세한 정보를 알려주세요\",\"7f46ab7102155b95\":\"만들기 시작하기\",\"7f4858c42094647d\":\"Bugbot은 PR에서 직접 수정된 파일이나 코드 줄뿐 아니라, 변경 사항이 기존 구성 요소와 어떻게 상호작용하는지, 그리고 코드의 다른 부분에서 어떤 가정이 이루어졌는지까지 살펴보며 정말 탄탄한 문제를 찾아냅니다.\",\"7f5639b21b1fd244\":\"관리자 대시보드 제어 기능 및 상세한 사용량 분석\",\"7f620780c2d1f640\":\"예정된 이벤트\",\"7f8cb8174c6d288f\":\"다음\",\"7f9e35745e53d2e4\":\"Stripe와 Resend를 직접 호출하지 않도록 테스트에 목이 필요합니다:\",\"7fd911253db0a766\":\"팟캐스트의 핵심 아이디어를 복습하고 기억해 보세요.\",\"8064028725a1eb0a\":\"사용자 수를 선택해 주세요\",\"808a06e881ffcce9\":\"우리 엔지니어링 팀에서 Cursor와 Bugbot을 없앤다면 반발이 일어날 겁니다.\",\"808fc5c2e1951427\":\"정렬 모듈에 Gotoh의 affine gap 알고리즘을 추가하고 FASTA parser를 수정하겠습니다. 먼저 정렬 코드부터 시작하겠습니다:\",\"80a806b037678633\":\"lib/monitoring.ts 읽기\",\"80fceba1ab22c9b6\":\"Cursor에서 열기\",\"811527ff5e5ed442\":\"문서 보기\",\"8124114f7b0b125b\":\"GitHub, Figma 같은 외부 도구와 데이터 소스를 Cursor에 직접 연결하세요.\",\"81be301092fc8057\":\"SOC 2 인증\",\"81d2ef8da717447c\":\"클라우드 Agent\",\"81f03004c1f90df1\":\"보고서 읽기\",\"823dd18df99aedef\":{\"c\":\"교육자이거나 학생 커뮤니티 리더라면, 여러분과 협력하고 싶습니다.\",\"i\":1,\"t\":\"p\"},\"8246d621ea8ec52c\":\"조사\",\"827e68aff643799c\":\"Cursor 자동화는 코드베이스를 지속적으로 모니터링하고 개선합니다.\",\"828bab5fbfcfbcde\":\"메시지 초안\",\"829ec3f51de6ced0\":\"개발 수명 주기 전반을 아우릅니다\",\"830144b812bfc2d1\":\"Tab은 현재 작업, 최근 변경 사항, 관련 파일을 파악해 컨텍스트에 맞는 제안을 제공합니다.\",\"8301a06d17659846\":\"지금 다운로드\",\"8309c65d02f2083f\":\"명령 실행 중:\",\"831fcd2ad04d4a75\":\"작업 항목을 Cursor에 할당하거나 댓글에 @Cursor를 멘션하면 클라우드 Agent가 해당 티켓을 pull request로 전환합니다.\",\"83441e88bde6609b\":\"고객\",\"834f35435ee4328a\":\"기술 보고서 읽기\",\"8362e40ccaebe65f\":\"자율 플릿 디스패치\",\"836654379ff43293\":\"중앙 집중식 청구 및 분석\",\"836e9a957ec01920\":\"내 테스트 스위트를 실행하고 실패한 항목을 수정해 줘\",\"8395fc05fa56bee3\":{\"c\":\"콘텐츠로 건너뛰기\",\"i\":1,\"t\":\"a\"},\"83a8e254b4219e3b\":\"반복적인 작업을 없애 시간을 절약하세요.\",\"83ca4e63fd8915ad\":\"문제없어 보여요. 프로덕션으로 푸시하죠\",\"83ced9c979128f72\":\"프로그래머로 일하는 즐거움이 분명히 더 커지고 있습니다. 페이지를 이리저리 뒤지는 데 시간을 쓰기보다, 원하는 결과를 만드는 데 더 집중하게 됩니다. 우리는 이제 겨우 가능성의 1%를 보고 있을 뿐이며, GPT-5 같은 모델은 Cursor와 같은 대화형 경험에서 가장 큰 가치를 발휘합니다.\",\"841cad15ee2276fc\":\"리소스\",\"844ba724a674a3f7\":\"저희는 Runlayer MCP와 플러그인을 활용해 Cursor 자동화로 소프트웨어 팩토리를 구축했습니다. 저희 에이전트가 적절한 도구, 적절한 컨텍스트, 적절한 가드레일을 갖추고 있기 때문에, 저희보다 규모가 다섯 배 큰 팀보다도 더 빠르게 움직일 수 있습니다.\",\"84d4b50eae09c2db\":\"에이전트가 아이디어를 코드로 구현합니다\",\"84d76c90046e2537\":\"탁월한 생산성을 위해 설계된 Cursor는 최고의 코딩 에이전트입니다.\",\"84f4a204ee39666b\":\"모두 완료되었습니다! 이제 PM이 몇 초 만에 Tab 중심 워크플로우와 에이전트 중심 워크플로우를 비교할 수 있도록 집중 점유율, 전환율, 롤링 참여도를 추적합니다.\",\"850f5bac44dcdd21\":\"Composer\",\"85488606bda60c1b\":\"Slack의 버그 → 수정 PR\",\"854e17c7839be3c0\":\"웹\",\"8566c5cf94f996a5\":\"오류가 있는지 콘솔 확인\",\"8686297d8ead4c4a\":\"기업\",\"86adfe970b92df99\":\"팀 구성원을 어떻게 초대하나요?\",\"873f59e14145d3d9\":\"PR 댓글 가져오기 문제 수정\",\"8771ef0850df133a\":[\"Ambassador는 밋업, 해커톤, 워크숍을 주최하고 커뮤니티 공간이 생산적이고 모두를 환영하는 분위기를 유지하도록 돕습니다. AI 기반 개발에 열정이 있고 사람들을 하나로 모으는 일을 즐긴다면, \",{\"c\":\"Ambassadors page\",\"i\":1,\"t\":\"a\"},\"에서 자세히 알아보고 지원해 보세요.\"],\"877a3e293ba7a890\":\"전 세계 기업의 신뢰를 받고 있습니다\",\"8780f6ef15afe6f7\":\"Ambassador 되기\",\"87aa37e5f754a7ec\":\"Cursor가 메시지를 읽고 적절한 리포지토리를 선택한 다음, 알맞은 모델에서 에이전트를 시작합니다. 기본값을 재정의하려면 프롬프트에 repo 또는 모델 이름을 지정하세요.\",\"87e76db64ce85576\":\"Slack에서 클라우드 Agent를 바로 실행하고, 완료된 pull request로 돌아가세요.\",\"88242b3b67bc5ac7\":\"터미널에서 바로 배포할 수 있도록 설계되었습니다. 어떤 환경에서든 같은 명령어를 사용하세요.\",\"884a87414509ad3e\":\"요청 유형을 선택해 주세요\",\"887be83f180b104e\":\"CLI\",\"888772b76ddcb869\":\"기업들은 Cursor로 개발하는 방식을 선택합니다.\",\"88908fbd8dad9761\":\"매우 빠름\",\"88bd94cd50693d81\":\"완료되었습니다. AMP와 보고서를 포함한 구성 가능한 MNIST 실험 프레임워크입니다.\\n\\n• **Training**: AMP, train/val 분할, 코사인 스케줄, 그래디언트 클리핑, 체크포인트\\n• **Experimentation**: YAML 설정, 저장된 이력, 혼동 행렬 + 분류 보고서, CLI 실행기\",\"8913e9f7a4d141db\":\"디버그\",\"895fd2de08368dbf\":[\"먼저 \",{\"c\":\"여기\",\"i\":1,\"t\":\"a\"},\"에서 여러분의 도시에 Cafe Cursor가 이미 예정되어 있는지 확인해 주세요. 없다면 \",{\"c\":\"이 폼\",\"i\":2,\"t\":\"a\"},\"을 작성해 주세요. 그러면 다음 단계와 함께 곧 연락드리겠습니다.\"],\"896546fbcd66d576\":\"Next.js 문서 검색 중\",\"8968b621e644f208\":\"함께하세요\",\"896c1833bfe2e801\":\"OpenAI, Anthropic, Gemini, xAI의 프런티어 모델 중에서 선택하세요.\",\"8a0e906f013175d4\":\"Campus Lead 되기\",\"8a2d5a723b8f5fb0\":\"Cursor로 매일 작성되는 기업 코드 줄 수.\",\"8a96c72d8f239c35\":\"팀에 문의하기\",\"8b1d3212790265c2\":\"강력한 스크립트와 자동화를 작성하세요\",\"8b53362d263ac815\":\"파일 탐색기\",\"8bb5d472774cfc64\":\"세계적 수준의 소프트웨어를 만드는 팀들이 매일 신뢰합니다.\",\"8bc4be782f2e3c23\":\"r/cursor 방문하기\",\"8c212c2aaaeefe9b\":\"청구 그룹\",\"8c464a152cd04831\":\"좋네요, 머지했습니다. @cursor 차트도 추가해 줄 수 있나요? 주요 지표용으로 선형, 막대, 원형 차트가 필요합니다.\",\"8d088a9a26ac644e\":\"요금제\",\"8d23b79cf6944120\":\"설치하고 에디터를 설정한 다음 첫 번째 에이전트를 실행하세요.\",\"8d35a5ee65935b96\":{\"c\":{\"c\":[{\"c\":\"GitHub 통합\",\"i\":3,\"t\":\"h3\"},{\"c\":\"곧 제공 예정...\",\"i\":4,\"t\":\"p\"}],\"i\":2,\"t\":\"div\"},\"i\":1,\"t\":\"div\"},\"8d8555364510a069\":\"계획됨\",\"8d9f890b1ae1d287\":\"메인 탐색으로 돌아가기\",\"8d9ff8d11ae284b7\":\"Mobile\",\"8dbf6600f09ca4c0\":\"이 크리에이터의 링크로 Cursor 50% 할인을 받으세요.\",\"8df7349e3c5ce6c0\":\"많은 작업이 내부 코드베이스와 통제된 소스에서 나오므로, 모델이 공개 학습 데이터에서 해당 작업이나 정답 패치를 이미 암기했을 위험을 줄일 수 있습니다.\",\"8e14d23733a9b556\":\"포함 사항:\",\"8e2d5677e4900c82\":\"25석 미만의 대부분 기업은 Teams 플랜을 직접 설정해 사용합니다.\",\"8e2e77f02272f961\":\"Bugbot의 버그 탐지 정확도는 어느 정도인가요?\",\"8e887f9fc0f8fd9b\":\"칸반 보드\",\"8ea580d96890d405\":\"다음 단계\",\"8eab8f6e2f56800a\":\"스트리밍 추가\",\"8eb0698bfa3c23fa\":\"티켓 기준으로 범위 지정\",\"8f4391b3890e0382\":\"Discord 방문하기\",\"8f8bba581607e76d\":\"`Object.assign`이 공유된 `DEFAULT_ROUTE_OPTIONS` 객체를 직접 변경합니다.\\n한 라이더의 경로 설정이 이후의 모든 이동에 유출됩니다.\",\"8fafe24c366ae433\":\"체크아웃 문제 디버그\",\"8fbe66d494e1c22a\":\"미들웨어에 통합합니다. 인증된 사용자는 ID를 사용하고, 익명 사용자는 IP 기준으로 레이트 리미팅됩니다:\",\"8fdd59301522c5e0\":\"Teams 평가판에 포함된 내용:\",\"8fdf1dc2b15283f1\":\"인증이 왜 깨졌나요?\",\"90585f4150afc7b3\":\"보관됨\",\"909cae41434f9a86\":\"Cursor는 자신이 만든 소프트웨어를 테스트해 결과를 검증하고 시연할 수 있습니다.\",\"90f46dbf8782cfde\":\"연결하다\",\"9180bef3fc0b0325\":\"Bugbot을 무료로 사용해 보세요\",\"918295d34336a9a9\":\"Bugbot은 맞춤 규칙과 권장 사항을 정의하고 이를 반복적으로 개선할수록 더 성능이 좋아집니다.\",\"91a52f5f194b7bdb\":\"PyTorch 혼합 정밀도 학습 권장 사항을 검색했습니다\",\"92222a39d8cbc921\":\"귀사의 조직을 위한 Cursor에 대해 자세히 알아보려면 영업팀에 문의하세요.\",\"9267d02879c5ac0b\":\"{rest} 읽는 중\",\"9284e84e5487ac79\":\"만들기\",\"92bff2e5e0c6a1c1\":\"수천 명의 개발자가 함께 만든 복잡한 코드베이스를 위해 설계되었습니다.\",\"931675186c5cd005\":\"저희 업무의 상당수는 Slack에서 오가는 아이디어와 논의에서 시작됩니다. 같은 맥락에서 메시지를 확인하고 바로 @cursor를 호출하면 몇 분 뒤에 PR이 생성됩니다. 이렇게 하면 에이전트가 작업을 처리하는 동안 도구와 맥락을 오가느라 시간을 쓰지 않아도 됩니다.\",\"931770504774b4f7\":\"최첨단을 유지하세요\",\"936ec164b44447a7\":\"디버그\",\"93fb479619083043\":\"이전 게시물\",\"94295f52f4d8e080\":\"라우팅 규칙\",\"9456d58f31a61f2b\":\"워크숍\",\"94648db68d24f4d4\":\"저희 엔지니어링 팀은 여러 도구를 오가야 하지 않을 때 가장 빠르게 배포할 수 있습니다. Cursor SDK를 사용하면 흐름을 끊지 않고도 Notion의 사양, 플랜, 버그 같은 업무를 작업에 맞는 적절한 모델을 사용하는 신뢰할 수 있는 클라우드 에이전트에 넘길 수 있습니다. 엔지니어는 Notion에 버그를 기록하고 이를 Cursor에 넘긴 뒤, 페이지를 벗어나지 않고도 검토된 PR을 받아볼 수 있습니다.\",\"94a3d104ef537bbd\":\"기업\",\"94bf3117127178f6\":\"업데이트와 PR 링크\",\"94d9e09f6bd61d4c\":\"생물정보학 도구\",\"95038f652b6e3b39\":\"nextjs.org/docs의 페이지 콘텐츠를 읽는 중\",\"956ca5d3267e7b5e\":\"문의하기\",\"9588289bb956e0d6\":\"문서\",\"9593aa46ec2b74ae\":\"Next.js App Router 가이드\",\"95c9ce9a6a720d22\":\"어떤 관리자 제어 기능을 사용할 수 있나요?\",\"964d0c9d4d40869d\":\"Cursor Teams\",\"9658ddb99c4505d5\":\"Teams의 모든 기능에 추가로:\",\"9678325a2e6bc9c4\":\"하나를 선택하세요\",\"96d464f31b046784\":\"개별 구독에서 어떻게 전환하나요?\",\"9703841fae471b04\":\"cookbook에서 보기\",\"97578b2fa664ce1e\":\"CursorBench 3.1 리더보드\",\"9771f37d703e9537\":\"게시물을 찾을 수 없습니다\",\"98033961decc844e\":\"야심찬 프로젝트를 더 빠르게 추진하세요\",\"980dae566249a797\":[{\"c\":\"레이아웃 프리셋:\",\"i\":1,\"t\":\"label\"},{\"i\":2,\"t\":\"Select\"}],\"9811c1145e7615a0\":\"이메일은 필수입니다\",\"9829c80e91cb2943\":\"Cursor Rules 문서와 .mdc 파일 형식을 검색했습니다\",\"9831463670a2e674\":{\"c\":\"클릭하여 다운로드\",\"i\":1,\"t\":\"div\"},\"99280e9a41f063aa\":\"8초간 생각함\",\"9973e017d74e1948\":\"Cursor는 제 생산성을 높여줬을 뿐 아니라, 새로운 문제 영역도 더 큰 호기심과 자신감을 갖고 탐색할 수 있게 도와주었습니다. 이제는 제 일상 워크플로우에서 없어서는 안 될 도구가 되었습니다.\",\"99e75a92f44cc2f3\":\"Cursor와 같은 코딩 에이전트는 AI의 킬러 앱이 되었습니다. 코딩 에이전트는 코드가 만들어지는 속도를 높일 뿐만 아니라, 코드 품질도 향상시킵니다.\",\"99f5c8d4f2297bb4\":\"실제 엔지니어링을 수행할 준비가 되었습니다\",\"9a475bc5672ca803\":\"브랜드 보이스에 맞는 미니멀한 세리프 기반 랜딩 페이지를 만들겠습니다.\",\"9afec9bb808aa78a\":\"Next.js App Router 동적 라우트 문서를 검색했습니다\",\"9b31372968411130\":\"인증을 획득했으며 정기적으로 침투 테스트를 거칩니다. 모든 제공업체에서 데이터 미보존을 지원합니다.\",\"9b773be101f7422b\":\"Cursor가 어떤 리포지토리를 사용할지 제가 정할 수 있나요?\",\"9b7742d0831b6688\":\"현대의 엔지니어링 팀은 Cursor를 기반으로 움직입니다.\",\"9b7c0dd8df3dd7f7\":[\"먼저 다음에서 팀을 만드세요: \"],\"9b92d718d24ad170\":\"__tests__/checkout.test.ts +156\",\"9bb17547a090d32b\":\"현대의 엔지니어링 팀은 SDLC를 자동화하고 있습니다.\",\"9c7d8855f08a2b88\":\"이렇게 보였을 때로 되돌리기\",\"9c8a5eb7ffd2fe3f\":\"커뮤니티 플러그인 가져오기\",\"9cab1ff57012c90f\":\"dispatch_tests.rs +62 -0\",\"9d13c1e0774f64c6\":\"중앙 집중식 보안 제어\",\"9d8eddb5e8265274\":\"문의하기\",\"9da235c0cfb1cc77\":\"버전\",\"9ddbeefd5d3a230d\":\"중앙화된 에이전트 제어\",\"9de6e9882ad20a96\":\"Teams 시작하기\",\"9e0f529b75653f6c\":\"Cursor 시작하기\",\"9e3fb413eac4ade2\":\"전문성을 바탕으로 AI를 대규모로 배포하세요.\",\"9e8730ae5c37e2ea\":\"리뷰됨\",\"9e9498bfe0c11194\":\" 또는 \",\"9ea887b1c95b3fe4\":\"Cursor는 터미널에서 실행되고, Slack에서 협업하며, GitHub에서 PR을 검토합니다.\",\"9f25d3a5565f0f54\":\"추천 자료\",\"9f4ee692873ef82f\":\"자체 테스트\",\"9f54a5b4ca1ab493\":\"통합 살펴보기\",\"9f8029cea7d6af10\":\"저희는 포트폴리오 기업과 Carlyle의 엔지니어링 팀들이 Cursor를 사용해 제품 로드맵을 가속화하고, 기능을 더 빠르게 배포하며, 품질과 집중력을 유지한 채 급증하는 수요에 대응하는 모습을 확인하고 있습니다. AI 기능과 Tab 자동 완성 기능은 놀라울 정도로 뛰어나며, 작게 시작해 시간이 지나면서 사용량을 확장할 수 있다는 점은 진정한 차별화 요소였습니다.\",\"9f9f85f5089153da\":\"Cursor는 학생 할인을 제공하나요?\",\"9fa2a817f1e9b55b\":\"성\",\"9feb3d6e394f3fc1\":\"프로덕션에서 체크아웃이 깨지고 있으니 테스트를 추가하세요\",\"a019a8addd792313\":\"Tab 살펴보기\",\"a06043249ed2506b\":\"실제 버그를 잡아내는 AI 코드 리뷰\",\"a07500afc2e2006b\":\"전용 모델\",\"a08a6f2a93c09efa\":{\"c\":{\"c\":\"요금제 표에 데이터가 없습니다\",\"i\":2,\"t\":\"p\"},\"i\":1,\"t\":\"div\"},\"a0c17a129691de17\":\"검색 중\",\"a0fc3a25401cbeb0\":\"MDM 및 서버 측 배포\",\"a107c6903c6015a0\":\"Cursor CLI\",\"a148183cb15e18e7\":\"팀을 위해 Cursor를 사용해 보세요.\",\"a174122ff9c667b8\":\"워크스페이스 사용량 내보내기 데이터와 과거 참여도 메모를 검토했습니다\",\"a179d2e7de33172e\":\"브라우저 상태를 살펴보고 콘솔을 확인해 체크아웃 문제를 조사하겠습니다.\",\"a18988aaa07e4ea4\":\"프로덕션 오류 조사\",\"a199a44a47592e55\":\"최고의 LLM 애플리케이션에는 자율성 슬라이더가 있습니다. AI에 얼마나 많은 자율성을 줄지 직접 제어할 수 있다는 뜻이죠. Cursor에서는 Tab 자동 완성을 쓰거나, Cmd+K로 특정 편집을 하거나, 완전 자율적인 agentic 모드로 맡길 수도 있습니다.\",\"a1cb4e5aac4d46b8\":\"오염 방지\",\"a1faffad19d20143\":\"hooks/useChat.ts 읽기\",\"a229586f3d6973bb\":[\"모든 플랜에는 일정량의 모델 사용량이 포함됩니다. 주문형 사용량을 사용하면 포함된 사용량을 모두 소진한 후에도 모델을 계속 사용할 수 있으며, 요금은 후불로 청구됩니다. 자세한 내용은 \",{\"c\":\"문서\",\"i\":1,\"t\":\"a\"},\"에서 확인하세요.\"],\"a2430c580f65dd90\":\"Dashboard.tsx +28 -15\",\"a25ea10b87bbba6e\":\"열린 패널이 없습니다\",\"a3e5f3e7d2de53c7\":\"샘플 프로젝트로 시작하세요\",\"a40ab1f598b39ca4\":\"제한된 Agent 요청 수\",\"a4349c702b053243\":\"팀 한도\",\"a4463041bbf7ee74\":\"수천 개 팀이 사용하는 필수 병합 전 검사\",\"a44c9173d1e4340b\":\"Cursor 다운로드\",\"a44e6b82a3fee3f1\":\"ID 관리\",\"a45f2d93eeb063c0\":\"app/api/chat/route.ts 읽기\",\"a4b1391dc80bb0ff\":\"수정 완료, 바로 사용할 수 있습니다.\",\"a4ecc2d52fb9c50b\":\"개인정보 처리방침\",\"a509632625e15e04\":\"스토리 읽기 →\",\"a518e05139c46029\":{\"c\":\"앱 이름:\",\"i\":1,\"t\":\"label\"},\"a538d39bf11fe8e4\":\"Graphite 살펴보기\",\"a553be36e93303cd\":\"준비 완료\",\"a55fb5a799f5e9f2\":\"어떤 환경에서든 같은 명령어를 사용하세요.\",\"a568f4362a3775f7\":\"프로토타이핑 도구\",\"a56a472a291d0334\":\"최신 게시물\",\"a5c76138e51bc273\":\"코드베이스 이해도 향상\",\"a6124639e2ef2e8c\":\"팀의 엔지니어링 지식 베이스\",\"a6265b7ba3b1cafe\":\"콘솔 오류 확인\",\"a6297f4ce85519b3\":\"웹 탐색 전략 계획 중\",\"a64a0be52b4fc0f2\":\"그리고 일치시키기\",\"a67444eda60dfcd7\":\"다음은 Next.js의 최신 기능입니다:\\n\\n**App Router** - React Server Components를 활용한 파일 기반 라우팅\\n\\n**Server Actions** - 클라이언트 컴포넌트에서 서버 변경 작업을 직접 수행\\n\\n**Partial Prerendering** - 정적 콘텐츠와 동적 콘텐츠를 결합\\n\\n**Turbopack** - Rust 기반 번들러로 더 빠른 빌드\",\"a696489b19285300\":\"CLI를 통해 에이전트에 접근할 수 있는 사용자 제한\",\"a70e077c69953ffe\":{\"c\":\"변형\",\"i\":1,\"t\":\"span\"},\"a712033e3d67958c\":\"워크스페이스 기능 도입 인사이트\",\"a75d820c2bed5d59\":\"뉴스\",\"a76c6ac6d2f27870\":\"반응형 래퍼와 함께 Recharts를 추가했습니다. 다크 모드를 지원하는 LineChart, BarChart, PieChart 컴포넌트를 만들었습니다.\",\"a7a6f6e342ca4342\":{\"c\":\"목차\",\"i\":1,\"t\":\"h3\"},\"a7ae3444a29fdfd8\":\"에이전트가 작업을 마치면 Jira에 완료 업데이트가 표시되고, pull request를 열 수 있는 링크도 함께 제공됩니다.\",\"a80a35888b3af7df\":\"질문하기\",\"a84f38c646301a14\":\"세션 컨텍스트\",\"a85212462f1062fe\":\"Cursor를 구동하는 동일한 런타임, 하네스, 모델을 사용해 프로그래밍 방식의 에이전트를 구축하세요. 몇 줄의 TypeScript만으로 로컬, 클라우드 또는 자체 호스팅 워커에서 에이전트를 실행할 수 있습니다.\",\"a86511fdeb38143c\":\"SCIM 프로비저닝\",\"a87c5bf26de05fc6\":\"커뮤니티에서 만든 플러그인을 찾아 설치하고 Cursor를 새로운 기능으로 확장하세요.\",\"a927f5d7884e1f6b\":\"탐색기\",\"a92f1c55e3ad85ac\":{\"c\":\"창 위치\",\"i\":1,\"t\":\"label\"},\"a952ce58214fcca1\":\"도움말\",\"a963f820a5b650f9\":\"취미용의 모든 기능에 더해:\",\"a97a224d1d10b45a\":\"강제 적용 + 선택 적용\",\"a9999562d20cd7e3\":\"동시 구매 엣지 케이스를 포함해 최종 테스트 파일로 합치는 중입니다:\",\"a9cb255c1f094dcf\":\"Cursor 로고 애니메이션\",\"a9db8d565687dca6\":\"고객\",\"aa17ce34f1ae7e13\":\"2일 전에 한 수정을 찾았습니다.\",\"aa1d335571e3735a\":\"클라우드 Agent를 생성할 수 있는 사용자 제한\",\"aa3697a2b9a83638\":\"제가 가장 선호하는 기업용 AI 서비스는 Cursor입니다. 현재 약 4만 명에 달하는 저희 엔지니어 모두가 AI의 도움을 받고 있으며, 생산성도 놀라울 만큼 향상되었습니다.\",\"aa55f8ba50526d48\":\"차세대 빌더들의 성장을 지원합니다.\",\"aa75a6e82ca765a0\":\"코드베이스 인덱싱\",\"aa765f8baa7c4c67\":\"Bugbot은 코드 리뷰에 드는 시간을 40%까지 줄이는 데 도움이 됩니다.\",\"aa979f92fa8d2070\":\"현재 구현은 전체 응답을 받은 후에야 렌더링합니다. 토큰이 생성되는 대로 표시되도록 이를 Server-Sent Events로 전환하겠습니다. 여기에는 세 가지가 필요합니다:\\n\\n• API 경로가 JSON 대신 ReadableStream 반환\\n• 클라이언트 훅이 청크를 점진적으로 처리\\n• 메시지 컴포넌트가 부분 콘텐츠를 자연스럽게 처리\",\"aaa31a67842ccb7c\":\"Cursor를 기존 스택에 연결하세요\",\"aac88e43e9edb059\":\"워크숍으로 돌아가기\",\"ab04b75ed948df39\":\"Cursor는 대규모 코드베이스와 모노레포를 어떻게 처리하나요?\",\"ab47f58386924b4f\":\"이전\",\"ab90e01358061b3c\":\"회사 이메일\",\"abed88531c506ad2\":\"Flashcards 열기\",\"ac288ee29724bcaa\":\"전 세계 Cursor 커뮤니티에 참여하세요.\",\"ac2b8c939e6cb51b\":\"브라우저에서 열기\",\"ace69d9094a43db2\":\"Cursor는 멘션을 읽고, 맥락 파악을 위해 채널 및 스레드 기록을 확인하며, 상태 업데이트, 완료 알림, 반응을 게시하기 위한 권한이 필요합니다. 각 권한은 Slack 통합 문서에 그 이유와 함께 나와 있습니다.\",\"ad31dc60e52abff9\":\"로깅, 감사 등을 위한 훅\",\"ad4c6bf8cc1bc124\":\"소프트웨어를 자율적으로 구축하고 유지 관리하는 에이전트.\",\"ad70bae411b9ad94\":\"실제 Cursor 세션\",\"ad8a1fd315a54572\":\"10초간 생각함\",\"ad8db1b4c443d154\":\"Cursor는 저희 엔지니어링 팀이 코드를 작성하고 배포하는 방식을 완전히 바꿔 놓았습니다. 도입 규모는 불과 몇 주 만에 150명에서 500명이 넘는 엔지니어(조직의 약 60%!)로 늘어났습니다.\",\"adac2a012a7c8893\":[{\"c\":{\"c\":[{\"i\":3,\"t\":\"input\"},{\"c\":\"Agents\",\"i\":4,\"t\":\"span\"}],\"i\":2,\"t\":\"label\"},\"i\":1,\"t\":\"li\"},{\"c\":{\"c\":[{\"i\":7,\"t\":\"input\"},{\"c\":\"사이드바\",\"i\":8,\"t\":\"span\"}],\"i\":6,\"t\":\"label\"},\"i\":5,\"t\":\"li\"},{\"c\":{\"c\":[{\"i\":11,\"t\":\"input\"},{\"c\":\"편집기\",\"i\":12,\"t\":\"span\"}],\"i\":10,\"t\":\"label\"},\"i\":9,\"t\":\"li\"},{\"c\":{\"c\":[{\"i\":15,\"t\":\"input\"},{\"c\":\"채팅\",\"i\":16,\"t\":\"span\"}],\"i\":14,\"t\":\"label\"},\"i\":13,\"t\":\"li\"},{\"c\":{\"c\":[{\"i\":19,\"t\":\"input\"},{\"c\":\"레이아웃 반전\",\"i\":20,\"t\":\"span\"}],\"i\":18,\"t\":\"label\"},\"i\":17,\"t\":\"li\"}],\"add06af2d143a34e\":\"components/ChatMessage.tsx +12 -3\",\"ae50a174ba97f253\":\"이제 체크아웃이 정상적으로 동작할 것입니다. 수정 내용:\\n\\n• GET 요청을 POST 요청으로 변경\\n• 올바른 `Content-Type` 헤더 추가\\n• 요청 본문에 장바구니 항목 포함\\n\\n체크아웃 버튼을 다시 클릭해 보세요!\",\"ae615e576a663d66\":\"알아보기\",\"ae796995c557b522\":\"스스로 움직이는 코드베이스 만들기\",\"aea8ee8859eadffe\":\"이제 클라이언트 훅입니다. 정리를 위해 AbortController를 사용하고 청크 처리를 위해 TextDecoder를 사용합니다:\",\"af04c1387ba5d2c3\":{\"c\":[{\"c\":\"다중 창 데모\",\"i\":2,\"t\":\"h1\"},{\"c\":\"여러 Cursor 구성 요소를 데스크톱 환경에서 함께 조합할 수 있는 방식을 보여주는 인터랙티브 데모입니다. 모바일 데모, 데스크톱 창, 사용자 지정 콘텐츠를 자유롭게 조합해 보세요.\",\"i\":3,\"t\":\"p\"}],\"i\":1,\"t\":\"div\"},\"af06607db5c632d8\":\"Trust Center 방문하기\",\"af5aa97562703b46\":\"Privacy Mode\",\"af5d0e31c91232b4\":\"Cursor 대시보드로 이동해 Slack 옆의 Connect를 클릭하거나, 설치 링크로 바로 이동하세요. Slack에 설치한 후에는 Cursor로 돌아와 GitHub를 연결하고, 기본 리포지토리를 선택한 다음, 개인정보 보호 설정을 확인하게 됩니다. 전체 안내는 Slack 통합 문서에서 확인할 수 있습니다.\",\"af7c94aa6d4477e6\":\"대규모로 오래 지속되는 소프트웨어를 개발하세요\",\"af86df4a43b53a29\":\"데이터 미보존\",\"afcdf02c13e7443a\":\"다음과 같은 기업의 엔지니어링 팀이 사용합니다\",\"b027166e406df396\":\"Bugbot에 대해 자세히 알아보기\",\"b03676d812682019\":\"클라우드 에이전트 알아보기\",\"b062be83d929593a\":\"Cursor 팀의 최신 업데이트와 인사이트를 전해드립니다. AI 기반 코딩, 제품 업데이트, 개발 팁을 살펴보세요.\",\"b073e2bd8e6fe0b0\":\"클라이언트가 사용량을 추적할 수 있도록 응답 헤더를 추가합니다:\",\"b0b2a3cd11daa9bf\":\"Rust의 Result 타입과 thiserror를 사용해 다루기 쉬운 오류 처리를 제공하는 async 디스패처 패턴과 플루언트 빌더 API를 구현하겠습니다. 기존 구조를 살펴본 뒤 디스패처를 구현하겠습니다:\",\"b0e84e35de44a0c3\":\"터미널\",\"b17fc287892e692b\":\"계획, 구현, 테스트, 리뷰를 수행하는 에이전트가 전체 개발 수명 주기를 아우르며 팀이 하나의 시스템처럼 배포할 수 있도록 합니다.\",\"b1a54abc5aef15dd\":\"후속 질문 추가\",\"b22a23fb121b158f\":\"모든 보도자료 보기\",\"b2c56256a18749ed\":\"일관된 패턴을 적용할 수 있도록 대시보드용 Cursor Rules를 설정하겠습니다. 필요한 모든 가이드라인이 포함된 rules 파일을 만들겠습니다:\",\"b3138d592dc7c058\":\"Cursor는 메모리 도구에 접근해 이전 실행에서 학습하고 반복할수록 개선될 수 있습니다.\",\"b376dcbaddbfa05c\":\"@cursor 이 PR 리뷰해줄래?\",\"b389719e28a5d0f6\":\"제출 중\",\"b3f8141fb274de52\":\"채팅 응답을 버퍼링하지 말고 스트리밍하세요\",\"b40708d7919c99b0\":\"전담 지원\",\"b448c513d2454013\":\"토큰 초기화를 수정했습니다. 모든 테스트를 통과했습니다.\",\"b483797ce356f199\":\"이용 권한을 받고 최대 $3,000까지 할인받으세요.\",\"b496ada4642fe600\":\"영업팀에 문의하기\",\"b4dfaa60acf1a1e4\":\"컨텍스트 추가\",\"b50d4ac14baf1cd4\":\"팀의 코드베이스를 학습하는 에이전트\",\"b5702d0b64866b08\":\"맞춤형\",\"b5fbe6f7bd4d22e1\":\"데이터 사용\",\"b5fe879e69879e16\":\"좋네요 @eric 리뷰해줄래?\",\"b65ecd55d74e8cff\":\"수정 커밋함\",\"b708abf0cf94875f\":\"테스트를 실행하고 실패한 항목 수정\",\"b70cb9a5f3747659\":{\"c\":\"폼을 제출하는 중입니다. 잠시만 기다려 주세요.\",\"i\":1,\"t\":\"span\"},\"b70e056a6e5000f2\":\"글로벌 규정 준수 기준\",\"b713e4542ff836e0\":\"macOS용 다운로드\",\"b740c7a7b992767c\":\".cursor/rules/next.mdc 생성됨\",\"b743d00d47a74370\":\"빌드 완료, 모든 테스트 통과. main에 push할까요?\",\"b77971d5b41a89c4\":[{\"i\":1,\"t\":\"input\"},{\"c\":\"등장 애니메이션\",\"i\":2,\"t\":\"span\"}],\"b81efb131f3b1a9c\":\"스트리밍 중 부분 메시지를 자연스럽게 처리하도록 추가합니다:\",\"b848773fd942cc02\":\"설치\",\"b8572691f57650fb\":{\"c\":{\"d\":{\"b\":{\"one\":{\"c\":[{\"i\":4,\"k\":\"_gt_n_4\",\"v\":\"n\"},\" 개의 답글\"],\"i\":3,\"t\":\"C3\"},\"other\":{\"c\":[{\"i\":4,\"k\":\"_gt_n_4\",\"v\":\"n\"},\" 개의 답글\"],\"i\":3,\"t\":\"C3\"}},\"t\":\"p\"},\"i\":2,\"t\":\"Plural\"},\"i\":1,\"t\":\"span\"},\"b8a9c56b13cc7334\":\"1시간 전\",\"b8f2fc82fa9222a0\":[{\"c\":\"기능 카드 샌드박스\",\"i\":1,\"t\":\"h1\"},{\"c\":\"다양한 창 위치에서 실제 크기의 기능 카드를 미리 볼 수 있습니다.\",\"i\":2,\"t\":\"p\"}],\"b9274324a46d2a6f\":\"Campus Lead는 학교에서 권장 사항을 알리고, 이벤트를 주최하며, Cursor를 전파하는 역할을 합니다. 모집 인원은 제한되어 있습니다.\",\"ba1b6da6e505857f\":\"개인정보 보호 세부 정보\",\"ba6b93068d235846\":\"전 세계를 선도하는 기업들로부터 신뢰를 받습니다.\",\"ba9d949e33fdea7f\":\"기존 스레드에서 @Cursor를 멘션하면 에이전트가 전체 대화를 컨텍스트로 읽습니다. 버그 보고, 설계, 오류 추적까지 다시 붙여넣을 필요가 없습니다.\",\"baa153273faba830\":\"feature-prd.md 읽기\",\"baba8cd4370efe6f\":\"이제 엔지니어의 70% 이상이 Cursor를 사용하고 있으며, 일상적인 개발 생산성이 의미 있게 향상되고, 대규모 마이그레이션은 더 빨라졌으며, 디버깅 속도와 온보딩 효율도 높아지는 것을 확인하고 있습니다.\",\"babbb7909517dd08\":\"Bugbot은 실제로 수정되는 버그에 맞춰 최적화되어 있습니다. 플래그된 항목의 70% 이상이 병합 전에 해결됩니다.\",\"bac1e2a546cd9bd0\":\"감사 로그\",\"bac7bdbb8c5e4a12\":\"최신 에피소드 듣기\",\"bacc356ce87576cb\":\"더 많은 고객 사례\",\"bafca95256932bd5\":\"SCIM 좌석 관리\",\"bb0544eee6926456\":\"모바일 Agent\",\"bba6b1acf453eda3\":{\"c\":[{\"i\":2,\"t\":\"input\"},{\"c\":\"카드 래퍼\",\"i\":3,\"t\":\"span\"}],\"i\":1,\"t\":\"label\"},\"bc2fb5b3283ed1cc\":\"읽는 중\",\"bc3408284caf7f79\":\"커뮤니티 팀에 어떻게 연락할 수 있나요?\",\"bc39ef905b0fa1c2\":\"일정이나 이벤트 기반 트리거에 따라 자동으로 실행되는 에이전트를 설정하세요.\",\"bc4b74fef3a4c713\":\"법률\",\"bc4d22efb7ac2897\":\"파트너십\",\"bc4eef54a8ea9c4b\":\"에이전트를 Cursor에서 지원하는 모든 모델로 라우팅하세요. 필드 하나만 바꿔 모델을 전환하고, 각 워크플로우에 맞게 요금과 성능의 균형을 맞출 수 있습니다.\",\"bca77b31c7b7224b\":\"Bugbot: PR 댓글 가져오기 버그\",\"bccce2af8879fb6f\":\"expose 패턴을 검색했습니다\",\"bd3deac54c2c3113\":\"이메일 주소\",\"bd58e914505ad4cb\":\"변경된 파일\",\"bda5af471ef547e0\":\"더보기\",\"bdbd9f7f0f5d5a0c\":\"Web에서 열기\",\"bdf67e083afe3bdd\":\"모델 전환\",\"bdf8bfcd167eaf5f\":\"반복적인 작업을 상시 실행되는 에이전트에 맡기세요. 일정 또는 이벤트 기반 트리거에 따라 실행되는 Cursor Automations를 설정해 소프트웨어를 구축하고, 유지보수하고, 문제를 해결하세요.\",\"be3c1d1560fed876\":\"Teams 시작하기\",\"be96622f3f612ca8\":\"완료 — App Router를 사용하는 Next.js 14, Prisma를 통한 Postgres, 그리고 기본 Redis 구성까지 설정했습니다. 컴포넌트를 위해 Tailwind와 shadcn/ui도 추가했습니다.\",\"be9eac62bb2f0b61\":\"팀 사용량 분석\",\"beaee8f6e098452f\":\"Cursor Jira 통합\",\"bf0e2dd170bdde17\":\"프로젝트를 빌드하고 모든 테스트가 통과하는지 확인하세요\",\"bf13f94cf8c927f0\":\"스스로 관리되는 코드베이스를 향해 나아가세요\",\"bf1b49c6b5d12a4b\":\"Cursor는 코드베이스를 깊이 이해하고 팀의 작업 패턴을 학습합니다.\",\"bf2671224a24b47c\":\"Cursor는 내 데이터를 어떻게 사용하나요?\",\"bf3339c9049610e7\":\"Cursor의 캠퍼스 프로그램과 이벤트 소식을 어떻게 받아볼 수 있나요?\",\"bf51ac36e3f4b08e\":\"이전 게시물\",\"bfbfa5b2574fa37b\":\"콘솔 출력:\",\"bff944189ba9c100\":\"다운로드\",\"c023d867365b64ba\":\"채점\",\"c03778e76b42c497\":\"편집기\",\"c048cd4528499c2c\":\"실제 Cursor 세션을 바탕으로 구축한 표준 오프라인 eval suite에서의 정확도 결과.\",\"c09408a8e9ceda27\":\"특화된 요구 사항이 있는 팀을 위한 맞춤형 지원.\",\"c0c67d1670fc2a90\":{\"c\":\"데모 옵션\",\"i\":1,\"t\":\"div\"},\"c0c8dc428a2c17db\":\"Cursor Automations는 고객과 엔지니어 사이의 간극을 줄이는 데 도움을 주고 있습니다. 고객의 요구에 더 빠르게 대응하고, 더 나은 해결책을 제공할 수 있게 되었습니다.\",\"c176f43f50a1f1e1\":\"귀하를 Cursor의 얼리 접근 프로그램에 참여시켜 드리고 싶습니다. community@cursor.com으로 연락해 주세요.\",\"c199131a6d9fb4a0\":\"쌓여 가는 작업을 넘기세요.\",\"c1fc0d9d4bd55d16\":\"기준에 맞게 조정됩니다\",\"c22400eee0435e76\":\"학습 내용:\",\"c287dd16bad2c81d\":\"추가 정보\",\"c2aa694dac7eafca\":\"새 애널리틱스 대시보드를 시작합니다. 목표는 500ms 미만의 로드 시간, 실시간 업데이트, 모바일 반응형 지원입니다.\",\"c2e2bf22182d0283\":\"데이터베이스를 쿼리하고 결과를 차트로 시각화하세요.\",\"c2fbf910c301aafd\":\"백로그에 쌓여 있는 티켓을 Cursor에 지정하면 에이전트가 1차 작업을 진행합니다.\",\"c30cf1cad3d6d524\":\"개별 플랜\",\"c31955b6041916e1\":\"Cursor cookbook의 스타터 프로젝트를 포크해 사용 사례에 맞게 확장하세요.\",\"c32c304745e718cf\":\"Cursor가 제 해커톤을 후원할 수 있나요?\",\"c33a2b9d68ef2d9c\":\"잠들지 않는 에이전트\",\"c342f2c79b5e9cf0\":\"자동 테스트 커버리지\",\"c34d7f6170836f7c\":\"포럼\",\"c3563163564cb1b8\":\"에이전트 검색\",\"c3a2274a4becba39\":\"더 보기\",\"c3a9a621efe6a3f4\":\"플랜: 기존 CSS 변수 위에 next-themes를 적용해, 사용자 제어로 유지되는 테마(light/dark/system)를 추가합니다.\",\"c3b015989eb2fe70\":\"모바일 Agent 사용해 보기\",\"c3bbd7411a2dc811\":\"클라우드\",\"c3c344022dccf7a7\":\"문의해 주셔서 감사합니다!\",\"c3cc983b6deb30a4\":\"내부 규칙, 스킬, 플러그인을 위한 팀 마켓플레이스\",\"c3e1ee28da056bab\":\"Privacy Mode 및 SSO\",\"c3e4349eed98e2f5\":\"영업팀에 문의하기\",\"c3eeeebc1a198efd\":{\"c\":\"Changelog\",\"i\":1,\"t\":\"Link\"},\"c3f14d11667ad36f\":\"Pro의 모든 기능에 추가로:\",\"c40b1cfd56fa0de6\":\"최초 담당자 응답 시간: 8시간(긴급), 24시간(Standard)\",\"c45fa7210be5f8b3\":\"내가 소유한 에이전트에 후속 지침을 추가하려면 같은 스레드에서 @Cursor를 멘션하세요. 이미 에이전트가 있는 스레드에서 별도의 에이전트를 시작하려면 \\\"@Cursor agent [prompt]\\\"를 사용하세요. 멀티 에이전트 스레드에서는 특정 에이전트의 메시지에서 컨텍스트 메뉴를 열고 Add follow-up을 선택하세요.\",\"c4ac61ee0ac2ae64\":\"빌드, 테스트, 설치까지 Cursor에서 직접 셸 명령을 실행하세요. 기본적으로 샌드박스 환경에서 실행됩니다.\",\"c5103f332c203408\":\"SSO (SAML/OIDC)\",\"c54113c3306875ad\":\"커뮤니티\",\"c54481fddbfd9119\":\"활성 멤버에게만 청구되는 단일 인보이스. 언제든 팀원을 추가하거나 제거할 수 있습니다.\",\"c553a5395b3b1cfa\":\"동적 경로와 레이아웃으로 Next.js App Router를 설정했습니다\",\"c59720248f69d5aa\":\"추천\",\"c5e995b51386bc7e\":\"Composer 2.5 소개\",\"c621fea1e3da965f\":\"온디맨드 세션\",\"c632de0fdd2a3624\":\"하위 에이전트 출력 동기화 완료\",\"c646cb09e81e28fa\":\"{os}용 다운로드\",\"c6811cd62c77886e\":\"세계적 수준의 소프트웨어를 만드는 팀들이 매일 Cursor를 신뢰합니다\",\"c68414dae4539683\":\"사용자 수 선택\",\"c710cd0d66d03745\":\"중앙 집중식 팀 청구 및 관리\",\"c79562e6c2903fbb\":\"CursorBench 작동 방식\",\"c7aa0e169164a191\":\"마켓플레이스\",\"c7d1e9c9bd97d52d\":\"월간\",\"c7dbb9a113841ea2\":\"조직에서 Cursor의 사용량을 확인하고 관리하려면 어떻게 해야 하나요?\",\"c7fd97ce275e8bb0\":\"나에게 맞는 플랜은 무엇인가요?\",\"c824fe025739bbbf\":\"구독해 주셔서 감사합니다!\",\"c85837d615bc9a4b\":\"about-acme.md 읽기\",\"c87b8879fc8333e2\":\"feature-prd.md +21 -8\",\"c8834fdd4008efde\":\"Next.js App Router에서 동적 라우트를 만드는 방법을 보여드리겠습니다. 동적 라우트는 파일 이름에 대괄호 `[param]`를 사용합니다:\",\"c8d4d071f5e23d00\":\"하위 에이전트 3개 시작\",\"c8fdd5860c4d0a9f\":\"Peloton을 타면서 PR을 머지하고 있다는 게 아직도 믿기지 않습니다. 이제 노트북을 다시 열 일은 없을 것 같아요.\",\"c9181067d46a985d\":\"에이전트가 독립적으로 PR 위험을 분석하고, CVE를 분류·수정하며, 수정 사항으로 리뷰에 대응합니다.\",\"c9860107768e93bb\":\"자율성의 다음 단계\",\"ca01963e0a927b89\":\"분석 대시보드, AI Code Tracking API, 대화 인사이트\",\"ca0792cfbd061540\":\"마켓플레이스 둘러보기\",\"ca14db5237251099\":\"실제 버그를 잡아내는 AI 코드 리뷰. Bugbot은 오탐률을 낮게 유지하면서 가장 까다로운 로직 버그를 탐지합니다.\",\"ca2b83c52caed098\":\"티켓에 설명된 내용을 Cursor에 조사해 달라고 요청하고, 확인한 내용을 요약해 보세요.\",\"ca8db86b02f0bde1\":\"혼합 정밀도 학습, 학습률 스케줄링, 그리고 적절한 검증을 추가하세요. 또한 다양한 하이퍼파라미터 설정을 쉽게 실행할 수 있도록 실험 설정 시스템도 만들어 주세요.\",\"ca97d558587e12a5\":\"Cursor Teams 최대 $3,000 할인받기\",\"cb203d390c97f5ca\":\"새 Agent\",\"cb31ff4c01353706\":\"Bugbot은 사람의 승인 이후에도 실제 버그를 찾아냅니다. 심각도 높은 장애를 하나만 막아도 충분히 본전을 합니다.\",\"cb35cd9b294c3d02\":\"건너뛰기\",\"cb79ed591a0700e5\":\"BYOK\",\"cbb7e35d36bf4bff\":\"코드 변경을 검토하고, 위험도 평가를 위해 영향 범위를 판단하며, 검토자를 지정하고, 저위험 PR은 자동으로 승인하는 자동화를 만드세요.\",\"cbd3cf419f4ff821\":\"에이전트를 클릭하거나 +를 사용해 패널을 여세요\",\"cbd9f9d847eae52c\":\"Cursor는 코드를 한 줄도 작성하기 전에 코드베이스를 깊이 이해합니다.\",\"cbda139c4ec48d5c\":\"라우팅 설정\",\"cbf066b267ce2f52\":\"mod.rs +24 -0\",\"cc0129818ccf310f\":\"뉴스\",\"cc2b7a706cfc39b4\":[{\"c\":\"Discord\",\"i\":1,\"t\":\"strong\"},\"는 실시간 채팅을 하고 다른 사용자와 소통하기에 가장 좋습니다. \",{\"c\":\"포럼\",\"i\":2,\"t\":\"strong\"},\"은 자세한 질문을 하고 팀과 커뮤니티로부터 답변을 받을 수 있는 곳입니다. \",{\"c\":\"Reddit\",\"i\":3,\"t\":\"strong\"},\"(r/cursor)는 만들고 있는 것을 공유하고 최신 업데이트를 확인할 수 있는 곳입니다.\"],\"cc451211b7e9ab84\":\"기타 환경\",\"cc72692f67054c02\":\"차트가 아주 좋네요. 이제 데이터 레이어가 필요합니다 — 일간/주간/월간 지표를 집계해야 합니다.\",\"cc7d0cf027253a70\":\"테스트를 작성하는 동안 근본 원인을 수정하겠습니다. 재고 확인과 차감을 트랜잭션으로 묶습니다:\",\"cca404e55f855627\":\"코드 리뷰\",\"ccad79b4d6990332\":\"MCP\",\"ccf2f18675e90654\":{\"c\":\"등장 애니메이션\",\"i\":1,\"t\":\"span\"},\"cd03eb1b84271c02\":\"Agent\",\"cd3c661632950c98\":\"Cursor는 계획부터 코드 작성, 코드 리뷰까지 모든 단계를 지원합니다.\",\"cd3f7b352f68b3db\":\"blog/[slug]/page.tsx +25 -0\",\"cda832b2f71c04dc\":\"완료되었습니다! 관용적인 Rust 패턴을 사용해 견고한 차량 호출 디스패처를 구현했습니다:\\n\\n**핵심 기능:**\\n\\n• **thiserror**: Display를 지원하는 사용성 좋은 커스텀 오류 타입을 위한 derive 매크로\\n• **async/await**: 차량 매칭을 블로킹 없이 처리하는 Tokio 기반 비동기 디스패치\\n• **Builder Pattern**: 조기 검증을 위해 Result를 반환하는 유연한 API\\n• **#[must_use]**: 사용되지 않은 Result에 대한 컴파일러 경고로 조용한 실패 방지\\n• **Haversine**: 지오펜스 검증을 위한 정확한 대권 거리 계산\\n• **sqlx**: 공간 조회를 위해 PostGIS와 함께 사용하는 컴파일 타임 검증 SQL 쿼리\\n\\n이 디스패처는 각 빌더 단계에서 모든 지리공간 제약 조건을 검증하므로, 차량 시스템에서 잘못된 차량 호출 요청을 생성할 수 없게 합니다.\",\"cdc95aad781dc0dd\":\"미팅 예약 완료!\",\"cde882ca09bb7257\":\"Cursor Campus Lead가 되려면 어떻게 해야 하나요?\",\"cdf59bb37eb11976\":\"SAML / OIDC SSO\",\"ce1710e11b6649f2\":\"빌드가 성공적으로 완료되었고 9개 테스트가 모두 통과했습니다. 프로덕션 번들은 gzip 압축 시 46.8kB입니다.\",\"ce34020f9f3dd95d\":\"플랜이 업데이트되었습니다. 이제 만들 준비가 되었습니다!\",\"ce70fb481823713d\":\"모델 접근, MCP 및 에이전트 규칙을 설정하세요.\",\"ce87bcc078568281\":\"포럼\",\"ce8aeb2933c740af\":\"실행 중인 에이전트에 후속 지침을 어떻게 추가하나요?\",\"cea3baa4412a9f92\":\"app/api/health/route.ts 읽기\",\"ceb0ceb98405d4d6\":\"Anthropic, OpenAI, Gemini, Cursor 등의 프런티어 모델을 손쉽게 사용할 수 있습니다.\",\"cf5f77538fd5de2f\":\"처음부터 끝까지 작업을 수행하는 에이전트.\",\"cf6af51e409061ac\":\"기업 관리자에게는 도입률, 팀 및 개인별 사용 패턴, AI 지원 코드 지표, 생산성 인사이트를 보여주는 종합 분석 대시보드에 대한 접근 권한이 제공됩니다. 데이터는 기존 분석 플랫폼과 통합할 수 있도록 API를 통해 내보낼 수 있습니다.\",\"cf76727fdd0bfde9\":\"app\",\"d056a3b0213d082c\":\"다음 동작 예측\",\"d0cbe2c6d93702ca\":\"네. Cursor는 다음 순서로 리포지토리를 선택합니다: 메시지 내용, 최근 에이전트 활동, 라우팅 규칙, 채널 기본값, 그리고 개인 기본값입니다. 특정 리포지토리를 사용하게 하려면 메시지에 repo를 언급하세요(예: \\\"@Cursor in cursor-app, 로그인 버그를 수정해 줘\\\").\",\"d0e30cb381c025d3\":\"플랜 검토\",\"d132649486638e32\":\"놀라울 만큼 정확한 자동완성\",\"d143eea360aa5a1a\":\"업무용 이메일\",\"d150868de26bdd30\":\"기업 플랜은 좌석당 가격이 책정되며 기본 제공 사용량이 포함됩니다. 조직은 사용량이 많은 팀을 위해 추가 사용량을 사전 약정할 수 있으며, 관리자는 팀과 개별 사용자 수준 모두에서 설정 가능한 한도를 통해 요금을 완전히 관리할 수 있습니다.\",\"d16440b24b5c925b\":{\"c\":\"열린 파일이 없습니다\",\"i\":1,\"t\":\"div\"},\"d19878e6971baff2\":\"에이전트는 자체 샌드박스에서 변경 사항을 테스트하고 결과를 검증할 때까지 반복합니다.\",\"d202d9d961032e2a\":\"인기 있는 템플릿으로 시작하세요.\",\"d2152bfef4b32699\":\"제품\",\"d22617ca60c7b71d\":\"체크아웃 테스트 추가\",\"d243c1cd3d8d88bb\":\"레이트 리미팅 추가, 사용자당 분당 요청 100개\",\"d282125b7cbac365\":\"Cursor Ambassador가 되려면 무엇이 필요한가요?\",\"d2c162aae8f3f771\":\"자랑스럽게 후원합니다\",\"d2dcc2542eeaf207\":\"Datadog의 프로덕션 오류를 조사하고, 근본 원인을 식별하고, 수정안을 PR로 제안하도록 에이전트를 설정하세요.\",\"d2e2563331fe1e6d\":\"자동화된 에이전트는 사용자가 정의한 지침을 따르고 MCP를 통해 도구를 사용합니다.\",\"d39a28cd876dad92\":\"스트리밍이 적용되었습니다. 이제 토큰이 실시간으로 표시되고, 네트워크 문제 발생 시 자동으로 재연결됩니다. UX도 훨씬 더 반응성이 좋아질 것입니다.\",\"d4148ec565c4743c\":\"Blog 게시물 검색\",\"d447c8e2046c15a7\":\"스크립트와 자동화 워크플로우에서 Cursor CLI를 사용하세요.\",\"d44e0ff9cf36888d\":\"현대적인 엔지니어링 팀은 Cursor SDK를 기반으로 에이전트를 구축하고 있습니다\",\"d46511d1b8b667a3\":\"브랜치를 로컬에 체크아웃하지 않고도 에이전트의 원격 데스크톱에서 소프트웨어를 직접 조작할 수 있습니다.\",\"d482983c601bfdaf\":\"Git 및 체크포인트\",\"d4849622efb65017\":\"기존 ID 공급자를 사용해 팀원의 접근을 안전하게 보호하세요.\",\"d565e3bf107114e3\":[\"명령어는 \",{\"i\":1,\"k\":\"slash\",\"v\":\"v\"},\" · 파일은 \",{\"i\":2,\"k\":\"at\",\"v\":\"v\"},\"를 사용하세요\"],\"d568c6114a797c78\":\"국가\",\"d5fce9ca8c6a85cb\":\"lib/openai.ts 읽기\",\"d5ffb71cec1fe086\":\"우리는 800명이 넘는 엔지니어에게 Cursor를 도입했으며, 팀이 코드 변경 사항을 계획하고 실행하는 방식 전반에서 생산성이 크게 향상되고 있습니다. 새로운 애플리케이션을 만들든 기존 시스템을 리팩터링하든, 저는 다른 CTO들에게 Cursor를 강력히 추천합니다.\",\"d60a71be316b5515\":\"MSA 및 DPA\",\"d617eab55e035d7c\":\"디자인\",\"d634cde58351a321\":\"이슈를 할당하거나 @Cursor를 멘션하면 클라우드 Agent가 pull request를 생성합니다.\",\"d6a374682501678c\":\"커뮤니티 및 Standard 지원\",\"d6cd33283cb76d2b\":\"Cursor Rules 설정\",\"d703d3a3a0a5a8f4\":\"Cursor는 흐름을 끊지 않고 데이터셋을 정리하고, 파이프라인을 디버그하고, 복잡한 쿼리를 작성할 수 있게 도와줘 매주 몇 시간씩 절약하게 해 주며, 연구에 더 집중할 수 있게 해줍니다.\",\"d750c1e7860d9b43\":\"모든 환경에서 하나의 에이전트.\",\"d76d2aac794beef3\":\"Bugbot을 활용한 에이전트형 코드 리뷰\",\"d774680531a1b70f\":\"수정됨\",\"d7d89b9598c035a3\":\"여기로 이동하려면\",\"d82f1f95eb17aba6\":\"작업 항목을 Cursor에 할당하거나 댓글에서 @Cursor를 멘션하면 이슈에서 바로 클라우드 Agent가 시작됩니다.\",\"d8361e2bee18e806\":\"Cursor는 전 세계에서 가장 널리 쓰이는 IDE를 한층 더 강력하게 만들었습니다. 문제를 디버깅하고 그 원인을 과거의 정확한 코드 변경 사항과 연결하는 데 탁월하며, 문서 작성에도 뛰어나고, 새로 합류한 구성원들이 빠르게 적응하도록 돕는 데도 큰 역할을 했습니다.\",\"d894f6cb29f7a3ea\":\"뒤로\",\"d8b8be1cc9af2f61\":\"뉴스레터를 구독하세요\",\"d8dde29142d8de66\":\"주요 리포지토리 변경 사항과 새로 발생한 위험을 요약한 일일 다이제스트를 게시하는 에이전트를 설정하세요.\",\"d8fa33bff8ed141e\":\"후속 질문 추가...\",\"d9043f5143fe0fd9\":\"Slack, GitHub 등\",\"d97b5dd8464655b8\":\"Sasha Rush가 말하는 Composer의 배경 연구 · 13분\",\"d9ac95e72cf59bc9\":\"changelog 항목에 대한 직접 링크를 추가하고, 유지보수성을 높이기 위해 프로젝트 전반의 Node.js 버전 제약 조건도 업데이트했습니다.\",\"d9b367f3140f6dcb\":\"완전한 제어\",\"da07d7e88d7f5444\":{\"c\":\"곧 캘린더 초대를 받으실 예정입니다. 곧 말씀 나눌 수 있기를 기대합니다.\",\"i\":1,\"t\":\"p\"},\"da133351cf557e0e\":\"자주 묻는 질문\",\"da4ce32ad64318fc\":\"AI가 생성한 코드를 리뷰하는 데 특히 뛰어납니다.\",\"da6050141f2cedef\":\"기업 플랜이 적합한 경우는 언제인가요?\",\"da625103ce5f5208\":\"이 통합은 라우팅과 컨텍스트를 처리하므로 프롬프트만 작성하면 됩니다.\",\"da64003062513e88\":\"Agent 샌드박스 모드\",\"da774db072d07883\":\"팀이 에이전트를 어떻게 사용하고 있는지, 또 어떤 팀원에게 역량 강화가 필요한지 파악하세요.\",\"da7df39a216a4314\":\"Teams 평가판 요청이 접수되었습니다\",\"da81805383cfdb2e\":\"리드\",\"da941f717ffca8ac\":\"우리 디자인 팀의 Cursor 도입률은 100%입니다. 모두가 간단한 코드 프로토타이핑을 할 수 있는 능력을 입증했고, 75% 이상이 복잡한 프로토타이핑 결과물도 공유했습니다. 이것이 이렇게 빠르게 이뤄졌다는 점이 놀라울 정도입니다.\",\"dada2fbf148d3125\":\"PR 댓글 가져오기 패턴과 GitHub API 페이지네이션을 검색했습니다\",\"db338428991783aa\":\"상세한 사용량 분석\",\"db5182b21c81f098\":\"시작하기\",\"dbc1e153e3d2399e\":\"읽는 데 {minutes}분\",\"dbdca9058b743bce\":\"전 세계에서 열리는 Cursor meetups, cafes, hackathons, workshops를 살펴보세요.\",\"dbe531d9aec59f74\":\"조사하고 결과 보고받기\",\"dbed376c4f432c47\":\"단위 불일치를 수정했습니다.\",\"dc1259d0cdfcaee6\":\"Cursor Slack 앱은 어떻게 설치하나요?\",\"dc5725515daf9834\":\"요구 사항은 무엇인가요?\",\"dc576ae3388e7292\":\"Cursor의 전체 하네스 활용\",\"dc5a4bcf8bbf4cb7\":\"Cursor는 복잡한 소프트웨어를 만드는 코딩 에이전트입니다.\",\"dc6676383915f53d\":\"PyTorch MNIST 실험\",\"dc66ec0fed447677\":\"Slack에 추가\",\"dc9196f13649cb21\":\"Git\",\"dca36542a45d7a93\":\"매일 에이전트를 사용하는 사용자에게는 Pro+를, 에이전트를 많이 활용하는 파워 사용자에게는 Ultra를 권장합니다. 다른 사람과 협업하는 전문가에게는 Teams 플랜을 권장하며, 인보이스 청구, 공유 사용량 또는 고급 보안이 필요한 더 큰 조직에는 기업을 선택해야 합니다.\",\"dcba56b25ec8644f\":\"3분 전\",\"dcc0af95caa59d76\":\"Pro의 Agent 한도 3배\",\"dcea416021972768\":\"스레드 컨텍스트, 자동으로\",\"dd083da4e62444a8\":{\"c\":\"카드 너비\",\"i\":1,\"t\":\"label\"},\"dd3e295073f02342\":\"lib/inventory.ts 읽기\",\"dd3f019dd4a099fb\":\"질문\",\"dd4e4b92fc330d69\":\"중앙 집중식 청구\",\"dd620c45d6a6fde7\":\"JetBrains는 항상 업계 최고를 사용자에게 제공하는 것을 사명으로 삼아 왔습니다. Cursor가 JetBrains IDEs의 ACP 준수 에이전트 제품군에 특별 게스트로 합류하게 되어 매우 기쁩니다. 이번 협업은 Cursor와 JetBrains, 그리고 무엇보다도 개발자 모두에게 윈윈이 될 것입니다.\",\"dde99db10eb3c1f2\":\"스토리 읽기 →\",\"de1ce41c16badd28\":\"인보이스/PO 청구\",\"de49a77511672927\":\"할당하거나 멘션해 시작하기\",\"deb2f452357db348\":\"템플릿으로 만들기\",\"decd41724790ca96\":\"완전한 코드베이스 이해\",\"df047ad9010d2870\":\"Cursor 기업\",\"df416e575ae3c124\":\"jane@acme.co\",\"df5290bd49600596\":\"이제 개별 엔지니어도 몇 달이 아니라 며칠 만에 기존 코드베이스를 리팩터링하고 업그레이드하며, 새로운 코드베이스까지 만들고 있습니다.\",\"dfa70d17bade6472\":{\"c\":\"반복 재생\",\"i\":1,\"t\":\"span\"},\"dfc253b2f22cb782\":\"에이전트를 프로덕션에 빠르게 배포하세요\",\"dff469ee86a5de60\":\"약관\",\"e0045695f2f03c81\":\"관리자만 수정 가능\",\"e0202dc6ef1f6f8e\":\"New Agent\",\"e0a8df328f8796ee\":\"기업 플랜 살펴보기\",\"e0d0bb8437084aa1\":\"카드를 끌어다 놓으면 에이전트가 작업을 이어받아 PR을 열고 결과를 첨부 파일로 다시 올립니다.\",\"e0ed46d595d326c1\":\"이동 중에도 휴대폰에서 직접 클라우드 Agent를 실행하세요.\",\"e1210e1b48f58252\":\"어떤 터미널, 스크립트, 편집기에서든 에이전트를 실행하세요.\",\"e1249e65543554d8\":\"좋습니다. 적절한 traceback을 포함한 완전한 Gotoh 구현을 추가했습니다. 이제 FASTA 파서를 수정하겠습니다:\",\"e1bbb86fb2e27408\":\"Figma에서 디자인을 가져와 컴포넌트로 변환하세요.\",\"e1bf27e3016f4949\":\"빌드 및 테스트 실행\",\"e1d2bb567ce52134\":\"공유 팀 컨텍스트를 갖춘 클라우드 에이전트 및 자동화\",\"e21c6dc14a57e24a\":\"작업 출처\",\"e245c43046f4f5a7\":\"이것저것 실험해보는 분들을 위해\",\"e262829bfce3b46d\":\"기업용 사용량 한도는 어떻게 적용되나요?\",\"e27e0cd858beb063\":\"우리가 하는 일\",\"e28d6f2096add037\":\"추가 질문은 어디에서 할 수 있나요?\",\"e2ad836f588f1f40\":\"Shell Mode\",\"e2ed52e5a0741f36\":\"사용량 기반 청구로 이용하는 Bugbot\",\"e31e1c79fa70deff\":\"공유 사용량 + 관리자 전용 제어\",\"e38e7ff2f1bb0df5\":\"에디터에서 시작해 터미널, 브라우저, 휴대폰, 또는 팀이 이미 사용 중인 도구로 계속 작업하세요.\",\"e39a57514be028e9\":\"리뷰\",\"e3ffbb156b9e1e20\":\"리소스\",\"e43601ee1c8f4c36\":\"MCP 도구\",\"e4375af23f5f90ca\":\"Cursor는 동영상, 스크린샷, 로그 같은 아티팩트를 생성하므로 결과를 빠르게 검증할 수 있습니다.\",\"e454d627088c49e0\":\"이제는 매일 수십 개의 에이전트 브랜치가 머지되는 모습을 보는 일이 일상이 되었고, 그로 인한 속도 향상은 릴리스 주기부터 버그 백로그 해소까지 전반에 걸쳐 나타나고
